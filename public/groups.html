<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miniRama · Group Figurines</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF7;--surface:#FFFFFF;--surface-2:#F4F2EC;
  --border:#E8E4DA;--border-strong:#D4CEC0;
  --ink:#1A1814;--ink-2:#5C564E;--ink-3:#8E877C;
  --accent:#6B5BA8;--accent-hover:#5A4D90;--accent-soft:#EFEBF7;
  --success:#4A8A6E;--success-soft:#E8F0EB;
  --danger:#A85050;--danger-soft:#F5EAEA;
  --warn:#B8893A;--warn-soft:#F5EFE5;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.5;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;flex-shrink:0}
.home-link{color:var(--ink-2);text-decoration:none;font-size:12px}
.home-link:hover{color:var(--ink)}
.logo{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--ink);letter-spacing:.01em}
.logo em{font-style:italic;color:var(--accent)}
.logo-suffix{font-size:11px;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase;padding-left:12px;border-left:1px solid var(--border)}

.app{flex:1;display:grid;grid-template-columns:380px 1fr;overflow:hidden;min-height:0}
.col-left{overflow-y:auto;background:var(--surface);height:100%;border-right:1px solid var(--border)}
.center{padding:32px;background:var(--bg);overflow-y:auto;height:100%}

.section{padding:18px 20px;border-bottom:1px solid var(--border)}
.section:last-child{border-bottom:none}
.section-label{font-size:10px;font-weight:600;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.input-field{width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border-strong);border-radius:4px;color:var(--ink);font-size:13px;font-family:var(--sans);transition:border-color .15s}
.input-field:focus{outline:none;border-color:var(--accent)}
textarea.input-field{resize:vertical;min-height:62px;line-height:1.5;font-family:var(--sans)}

.upload-zone{display:block;background:var(--surface-2);border:2px dashed var(--border-strong);border-radius:8px;padding:48px 16px;text-align:center;cursor:pointer;transition:all .15s;color:var(--ink-3)}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.upload-zone input{display:none}
.upload-zone-icon{font-size:28px;margin-bottom:8px;font-weight:300;color:var(--ink-3)}
.upload-zone:hover .upload-zone-icon{color:var(--accent)}
.upload-zone-text{font-size:13px;font-weight:500}
.upload-zone-sub{font-size:11px;color:var(--ink-3);margin-top:4px}
.upload-zone.has-image{padding:0;border-style:solid;border-color:var(--border);background:var(--surface);min-height:160px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.upload-zone.has-image img{display:block;max-width:100%;max-height:240px;width:auto;height:auto}

.analysis-card{padding:14px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;transition:all .25s}
.analysis-card.tier-figurine{background:var(--success-soft);border-color:var(--success)}
.analysis-card.tier-bust,.analysis-card.tier-hard,.analysis-card.tier-reject{background:var(--danger-soft);border-color:var(--danger)}
.analysis-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.analysis-title-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.analysis-title-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.analysis-card.tier-figurine .analysis-title-icon{color:var(--success)}
.analysis-card.tier-bust .analysis-title-icon,.analysis-card.tier-hard .analysis-title-icon,.analysis-card.tier-reject .analysis-title-icon{color:var(--danger)}
.analysis-msg{font-size:11px;color:var(--ink-2);line-height:1.45}
.analysis-warnings{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border-strong)}
.analysis-warning{font-size:11px;color:var(--warn);font-family:var(--mono);letter-spacing:.02em;line-height:1.5}
.reject-actions{margin-top:10px;display:flex;gap:6px}
.reject-btn{flex:1;padding:7px 10px;background:var(--surface);border:1px solid var(--border-strong);border-radius:4px;color:var(--ink-2);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;text-decoration:none;text-align:center;display:inline-block}
.reject-btn:hover{border-color:var(--ink-3);color:var(--ink)}

.run-all-btn{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .15s;font-family:var(--sans)}
.run-all-btn:hover:not(:disabled){background:var(--ink-2)}
.run-all-btn:disabled{background:var(--surface-2);color:var(--ink-3);cursor:not-allowed}

/* 2x2 style grid */
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.style-card-wrap{position:relative}
.style-card{position:relative;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .15s;aspect-ratio:1/1}
.style-card:hover:not(.disabled){border-color:var(--accent);transform:translateY(-1px)}
.style-card.disabled{opacity:.5;cursor:not-allowed}
.style-card.running{border-color:var(--accent);background:var(--accent-soft)}
.style-card-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:var(--surface-2)}
.style-card-thumb-img.hidden{display:none}
.style-card-thumb-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:24px;color:var(--ink-3);background:var(--surface-2)}
.style-card-overlay{position:absolute;inset:auto 0 0 0;padding:8px 10px 10px;background:linear-gradient(to top,rgba(26,24,20,.92) 0%,rgba(26,24,20,.6) 60%,transparent 100%);color:#fff;display:flex;justify-content:space-between;align-items:flex-end;gap:8px}
.style-card-name{font-size:13px;font-weight:600;letter-spacing:.01em}
.style-card-chevron{background:rgba(255,255,255,.18);border:none;color:#fff;width:22px;height:22px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;transition:all .15s;font-family:var(--sans);padding:0}
.style-card-chevron:hover{background:rgba(255,255,255,.32)}
.style-card-chevron.open{transform:rotate(180deg);background:var(--accent)}
.style-card-running-pill{position:absolute;top:8px;right:8px;padding:4px 8px;background:var(--accent);color:#fff;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* Variant flyout */
.variant-flyout{margin-top:6px;padding:8px;background:var(--surface);border:1px solid var(--border-strong);border-radius:6px;box-shadow:0 2px 8px -2px rgba(26,24,20,.08);display:flex;flex-direction:column;gap:4px;animation:flyoutIn .15s ease-out}
@keyframes flyoutIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.variant-btn{padding:8px 10px;background:var(--surface);border:1px solid transparent;border-radius:4px;color:var(--ink);font-size:12px;font-weight:500;cursor:pointer;text-align:left;font-family:var(--sans);transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.variant-btn:hover{background:var(--accent-soft);border-color:var(--accent)}
.variant-btn-tag{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.variant-btn:hover .variant-btn-tag{color:var(--accent)}

.check-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);cursor:pointer}
.check-row input{width:14px;height:14px;cursor:pointer}

/* Stage */
.stage-empty{padding:80px 24px;text-align:center;color:var(--ink-3);background:var(--surface);border:1px solid var(--border);border-radius:8px;max-width:780px;margin:0 auto}
.stage-empty-title{font-family:var(--serif);font-size:32px;color:var(--ink);margin-bottom:8px;line-height:1.2}
.stage-empty-title em{font-style:italic;color:var(--accent)}
.stage-empty-sub{font-size:13px;max-width:480px;margin:0 auto;line-height:1.6}

.stack{display:flex;flex-direction:column;gap:14px;max-width:780px;margin:0 auto}
.stack-actions{display:flex;justify-content:flex-end;margin-top:8px}
.stack-actions-btn{padding:8px 16px;background:var(--ink);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);letter-spacing:.02em;transition:background .15s}
.stack-actions-btn:hover{background:var(--ink-2)}

.result-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow .15s,border-color .15s;cursor:pointer}
.result-card.active{border-color:var(--accent);box-shadow:0 4px 14px -4px rgba(107,91,168,.25)}
.result-card.loading{cursor:default}
.result-img-wrap{position:relative;background:var(--surface-2);aspect-ratio:1/1;display:flex;align-items:center;justify-content:center}
.result-img{width:100%;height:100%;object-fit:contain;display:block}
.result-loading{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--ink-3);font-size:12px}
.result-spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result-error{padding:24px;text-align:center;color:var(--danger);font-size:12px}
.result-meta{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:center}
.result-meta-left{flex:1;min-width:0}
.result-style-tag{font-size:10px;font-weight:600;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.result-mood{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-actions{display:flex;gap:6px;flex-shrink:0}
.result-btn{padding:5px 10px;background:var(--surface);border:1px solid var(--border-strong);border-radius:4px;color:var(--ink-2);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s}
.result-btn:hover{border-color:var(--ink-3);color:var(--ink)}
.result-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.result-btn.primary:hover{background:var(--accent-hover)}

.quality-warn{margin-top:8px;padding:10px 12px;background:var(--warn-soft);border:1px solid var(--warn);border-radius:6px;font-size:11px;color:var(--ink);line-height:1.5}
.quality-warn-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--warn);margin-bottom:3px}

.lightbox{position:fixed;inset:0;background:rgba(26,24,20,.92);z-index:1000;display:flex;align-items:center;justify-content:center;padding:32px;cursor:pointer}
.lightbox img{max-width:96%;max-height:96vh;object-fit:contain;border-radius:6px}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></symbol>
    <symbol id="i-warn" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zM12 9v5M12 17v.5"/></symbol>
  </defs>
</svg>

<div class="topbar">
  <a class="home-link" href="/index.html">← Home</a>
  <span class="logo">mini<em>Rama</em></span>
  <span class="logo-suffix">Group Figurines</span>
</div>

<div class="app">

  <div class="col-left">

    <div class="section">
      <label class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" onchange="onUpload(this)">
        <div id="uploadInner">
          <div class="upload-zone-icon">+</div>
          <div class="upload-zone-text">Click to upload</div>
          <div class="upload-zone-sub">JPG, PNG, HEIC</div>
        </div>
      </label>
    </div>

    <div class="section" id="analysisSection" style="display:none">
      <div class="section-label">Photo analysis</div>
      <div class="analysis-card" id="analysisCard">
        <div class="analysis-title">
          <span class="analysis-title-icon" id="analysisIcon"><svg><use href="#i-search"/></svg></span>
          <span id="analysisName">Analyzing…</span>
        </div>
        <div class="analysis-msg" id="analysisMsg"></div>
        <div class="analysis-warnings" id="analysisWarnings" style="display:none"></div>
        <div class="reject-actions" id="rejectActions" style="display:none">
          <button class="reject-btn" onclick="resetUpload()">New upload</button>
          <a class="reject-btn" href="/index.html">Back home</a>
        </div>
      </div>
    </div>

    <div class="section" id="runAllSection" style="display:none">
      <button class="run-all-btn" id="runAllBtn" onclick="runAllStandard()" disabled>Run all four (Standard)</button>
    </div>

    <div class="section" id="styleSection" style="display:none">
      <div class="section-label">Pick a style</div>
      <div class="style-grid" id="styleGrid"></div>
    </div>

    <div class="section" id="plaqueSection" style="display:none">
      <div class="section-label">Plaque title (optional)</div>
      <input class="input-field" id="plaqueText" placeholder="Leave blank — we'll suggest something" maxlength="60">
      <label class="check-row" style="margin-top:10px">
        <input type="checkbox" id="noPlaqueCheck"> No plaque or text
      </label>
    </div>

    <div class="section" id="notesSection" style="display:none">
      <div class="section-label">Notes (optional)</div>
      <textarea class="input-field" id="notesText" placeholder="Anything specific you'd like the sculptor to know…"></textarea>
    </div>

  </div>

  <div class="center">
    <div id="stage">
      <div class="stage-empty">
        <div class="stage-empty-title">A figurine for the <em>family</em></div>
        <div class="stage-empty-sub">Upload a photo of the people you'd like to sculpt — visible from at least the knees up. We'll handle the rest.</div>
      </div>
    </div>
  </div>

</div>

<script>
const ANALYZE_URL  = '/api/v1/groups/analyze'
const GENERATE_URL = '/api/v1/groups/generate'

const STYLES = [
  {
    k:'figurine', label:'Figurine', thumb:'/previews/groups/figurine.jpg',
    variants:[
      { k:'standard',     label:'Standard'     },
      { k:'action_scene', label:'Action Scene' },
      { k:'portrait',     label:'Portrait'     },
    ],
  },
  {
    k:'plushy', label:'Plushy', thumb:'/previews/groups/plushy.jpg',
    variants:[
      { k:'standard',     label:'Standard'     },
      { k:'action_scene', label:'Action Scene' },
    ],
  },
  {
    k:'stop_motion', label:'Stop Motion', thumb:'/previews/groups/stop_motion.jpg',
    variants:[
      { k:'standard',     label:'Standard'     },
      { k:'action_scene', label:'Action Scene' },
    ],
  },
  {
    k:'designer', label:'Designer', thumb:'/previews/groups/designer.jpg',
    variants:[
      { k:'standard',        label:'Standard'        },
      { k:'library_edition', label:'Library Edition' },
    ],
  },
]
const STYLE_LABEL = Object.fromEntries(STYLES.map(s => [s.k, s.label]))

const state = {
  fileB64:    null,
  proceedable:false,
  running:    {},      // styleKey -> bool (any variant of style currently running)
  openCard:   null,    // styleKey of card with variant flyout open, or null
  stack:      [],
  activeId:   null,
  cardCounter:0,
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

// ─── STYLE GRID ──────────────────────────────────────────────────

function buildStyleGrid() {
  const grid = document.getElementById('styleGrid')
  grid.innerHTML = ''
  STYLES.forEach(s => {
    const isRunning = !!state.running[s.k]
    const isOpen    = state.openCard === s.k
    const wrap = document.createElement('div')
    wrap.className = 'style-card-wrap'

    const card = document.createElement('div')
    card.className = 'style-card' + (isRunning ? ' running' : '') + (state.proceedable ? '' : ' disabled')

    // Image with fallback. The img is on top; if it loads, it covers the
    // fallback. If it 404s, .hidden via onerror reveals the fallback.
    card.innerHTML =
      `<div class="style-card-thumb-fallback">${esc(s.label)}</div>
       <img class="style-card-thumb-img" src="${esc(s.thumb)}" alt="" onerror="this.classList.add('hidden')">
       <div class="style-card-overlay">
         <div class="style-card-name">${esc(s.label)}</div>
         <button class="style-card-chevron${isOpen?' open':''}" type="button">▾</button>
       </div>
       ${isRunning ? '<div class="style-card-running-pill">Running…</div>' : ''}`

    if (state.proceedable && !isRunning) {
      // Click on the card body (not the chevron) → run Standard
      card.onclick = (e) => {
        if (e.target.closest('.style-card-chevron')) return
        runStyle(s.k, 'standard')
      }
      // Chevron click → toggle variant flyout
      card.querySelector('.style-card-chevron').onclick = (e) => {
        e.stopPropagation()
        state.openCard = (state.openCard === s.k) ? null : s.k
        buildStyleGrid()
      }
    }

    wrap.appendChild(card)

    // Variant flyout (only when this card is open)
    if (isOpen && state.proceedable && !isRunning) {
      const flyout = document.createElement('div')
      flyout.className = 'variant-flyout'
      s.variants.forEach(v => {
        const btn = document.createElement('button')
        btn.type = 'button'
        btn.className = 'variant-btn'
        btn.innerHTML = `<span>${esc(v.label)}</span><span class="variant-btn-tag">Run</span>`
        btn.onclick = () => {
          state.openCard = null
          runStyle(s.k, v.k)
        }
        flyout.appendChild(btn)
      })
      wrap.appendChild(flyout)
    }

    grid.appendChild(wrap)
  })
}

// ─── UPLOAD ──────────────────────────────────────────────────────

async function onUpload(inp) {
  const file = inp.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = async () => {
    const dataUrl = reader.result
    state.fileB64 = dataUrl.split(',')[1]
    showSourcePreview(dataUrl)
    revealSidebar(false)
    await runAnalyze()
  }
  reader.readAsDataURL(file)
}

function showSourcePreview(dataUrl) {
  const zone = document.getElementById('uploadZone')
  zone.classList.add('has-image')
  document.getElementById('uploadInner').innerHTML = `<img src="${dataUrl}" alt="source photo">`
}

function resetUpload() {
  state.fileB64 = null
  state.proceedable = false
  state.running = {}
  state.openCard = null
  state.stack = []
  state.activeId = null
  document.getElementById('fileInput').value = ''
  const zone = document.getElementById('uploadZone')
  zone.classList.remove('has-image')
  document.getElementById('uploadInner').innerHTML =
    `<div class="upload-zone-icon">+</div>
     <div class="upload-zone-text">Click to upload</div>
     <div class="upload-zone-sub">JPG, PNG, HEIC</div>`
  ;['analysisSection','runAllSection','styleSection','plaqueSection','notesSection'].forEach(id => {
    document.getElementById(id).style.display = 'none'
  })
  setStageEmpty()
}

function revealSidebar(showRunAndStyles) {
  document.getElementById('analysisSection').style.display = 'block'
  ;['runAllSection','styleSection','plaqueSection','notesSection'].forEach(id => {
    document.getElementById(id).style.display = showRunAndStyles ? 'block' : 'none'
  })
}

// ─── ANALYZE ─────────────────────────────────────────────────────

async function runAnalyze() {
  setAnalysisCard({ tierClass:'analyzing', icon:'i-search', name:'Analyzing your photo…', msg:'This takes a few seconds.', warnings:[] })
  document.getElementById('runAllBtn').disabled = true

  try {
    const res = await fetch(ANALYZE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_b64: state.fileB64 }),
    })
    const data = await res.json()
    if (data.error) {
      setAnalysisCard({ tierClass:'reject', icon:'i-warn', name:'Could not analyze', msg:data.error, warnings:[], showRejectActions:true })
      return
    }

    state.proceedable = data.proceedable === true
    const ok = state.proceedable

    let name = ok
      ? (data.subject_count === 1 ? '1 subject ready' : `${data.subject_count} subjects ready`)
      : 'This photo needs adjustment'

    setAnalysisCard({
      tierClass:        data.tier,
      icon:             ok ? 'i-check' : 'i-warn',
      name,
      msg:              data.message || '',
      warnings:         data.warnings || [],
      showRejectActions: !ok,
    })

    if (ok) {
      revealSidebar(true)
      buildStyleGrid()
      document.getElementById('runAllBtn').disabled = false
    } else {
      revealSidebar(false)
      buildStyleGrid()
    }
  } catch (e) {
    setAnalysisCard({ tierClass:'reject', icon:'i-warn', name:'Could not analyze', msg:e.message || String(e), warnings:[], showRejectActions:true })
  }
}

function setAnalysisCard(cfg) {
  const card = document.getElementById('analysisCard')
  card.className = 'analysis-card tier-' + cfg.tierClass
  document.getElementById('analysisIcon').innerHTML = `<svg><use href="#${cfg.icon}"/></svg>`
  document.getElementById('analysisName').textContent = cfg.name
  document.getElementById('analysisMsg').textContent  = cfg.msg

  const wEl = document.getElementById('analysisWarnings')
  if (cfg.warnings && cfg.warnings.length) {
    wEl.innerHTML = cfg.warnings.map(w => `<div class="analysis-warning">⚠ ${esc(w)}</div>`).join('')
    wEl.style.display = 'block'
  } else { wEl.style.display = 'none' }

  document.getElementById('rejectActions').style.display = cfg.showRejectActions ? 'flex' : 'none'
}

// ─── GENERATE ────────────────────────────────────────────────────

async function runAllStandard() {
  if (!state.proceedable) return
  STYLES.forEach(s => {
    if (!state.running[s.k]) runStyle(s.k, 'standard')
  })
}

async function runStyle(styleKey, variantKey) {
  if (!state.proceedable) return
  if (state.running[styleKey]) return  // prevent double-run on same style

  state.running[styleKey] = true
  state.openCard = null
  buildStyleGrid()
  document.getElementById('runAllBtn').disabled = true

  const cardId = 'card_' + (++state.cardCounter)
  const placeholder = {
    id:         cardId,
    style:      styleKey,
    variant:    variantKey,
    state:      'loading',
    imageUrl:   null,
    moodLabel:  null,
    warning:    null,
    error:      null,
  }
  state.stack.unshift(placeholder)
  state.activeId = cardId
  renderStack()

  const body = {
    source_image_b64: state.fileB64,
    plaque_title:     document.getElementById('plaqueText').value.trim() || undefined,
    no_plaque:        document.getElementById('noPlaqueCheck').checked === true,
    scene_style:      styleKey,
    scene_variant:    variantKey,
    notes:            document.getElementById('notesText').value.trim() || undefined,
  }

  try {
    const res = await fetch(GENERATE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    const data = await res.json()

    const card = state.stack.find(c => c.id === cardId)
    if (!card) return

    if (data.rejected)      { card.state = 'error'; card.error = data.message || "This photo couldn't be used." }
    else if (data.error)    { card.state = 'error'; card.error = data.error }
    else if (!data.result)  { card.state = 'error'; card.error = 'No result returned.' }
    else {
      card.state     = 'done'
      card.imageUrl  = 'data:image/jpeg;base64,' + data.result.image_b64
      card.moodLabel = data.result.mood_summary || ''
      card.warning   = data.result.quality_warning || null
    }
  } catch (e) {
    const card = state.stack.find(c => c.id === cardId)
    if (card) { card.state = 'error'; card.error = e.message || String(e) }
  } finally {
    state.running[styleKey] = false
    buildStyleGrid()
    const anyRunning = Object.values(state.running).some(v => v)
    document.getElementById('runAllBtn').disabled = anyRunning ? true : !state.proceedable
    renderStack()
  }
}

// ─── STAGE / STACK ───────────────────────────────────────────────

function setStageEmpty() {
  document.getElementById('stage').innerHTML =
    `<div class="stage-empty">
       <div class="stage-empty-title">A figurine for the <em>family</em></div>
       <div class="stage-empty-sub">Upload a photo of the people you'd like to sculpt — visible from at least the knees up. We'll handle the rest.</div>
     </div>`
}

function renderStack() {
  if (state.stack.length === 0) { setStageEmpty(); return }
  const cardsHtml = state.stack.map(c => renderResultCard(c)).join('')
  const showDownloadAll = state.stack.filter(c => c.state === 'done').length > 1
  const actionsHtml = showDownloadAll
    ? `<div class="stack-actions"><button class="stack-actions-btn" onclick="downloadAll()">Download all</button></div>`
    : ''
  document.getElementById('stage').innerHTML = `<div class="stack">${cardsHtml}${actionsHtml}</div>`
}

function variantLabel(styleKey, variantKey) {
  const style = STYLES.find(s => s.k === styleKey)
  if (!style) return variantKey
  const v = style.variants.find(x => x.k === variantKey)
  return v ? v.label : variantKey
}

function renderResultCard(c) {
  const isActive = c.id === state.activeId
  const styleLabel = STYLE_LABEL[c.style] || c.style
  const variantTag = c.variant && c.variant !== 'standard' ? ` · ${variantLabel(c.style, c.variant)}` : ''

  if (c.state === 'loading') {
    return `<div class="result-card loading${isActive?' active':''}" id="${c.id}">
              <div class="result-img-wrap">
                <div class="result-loading">
                  <div class="result-spin"></div>
                  <div>Sculpting ${esc(styleLabel.toLowerCase())}…</div>
                </div>
              </div>
              <div class="result-meta">
                <div class="result-meta-left">
                  <div class="result-style-tag">${esc(styleLabel)}${esc(variantTag)}</div>
                  <div class="result-mood">In progress</div>
                </div>
              </div>
            </div>`
  }

  if (c.state === 'error') {
    return `<div class="result-card${isActive?' active':''}" id="${c.id}" onclick="bringToFront('${c.id}')">
              <div class="result-img-wrap">
                <div class="result-error">${esc(c.error)}</div>
              </div>
              <div class="result-meta">
                <div class="result-meta-left">
                  <div class="result-style-tag">${esc(styleLabel)}${esc(variantTag)}</div>
                  <div class="result-mood">Couldn't render</div>
                </div>
                <div class="result-actions">
                  <button class="result-btn" onclick="event.stopPropagation();retryCard('${c.id}')">Try again</button>
                </div>
              </div>
            </div>`
  }

  const warnHtml = c.warning
    ? `<div class="quality-warn"><div class="quality-warn-label">Note</div>${esc(c.warning)}</div>`
    : ''

  return `<div class="result-card${isActive?' active':''}" id="${c.id}" onclick="bringToFront('${c.id}')">
            <div class="result-img-wrap">
              <img class="result-img" src="${c.imageUrl}" onclick="event.stopPropagation();openLightbox('${c.imageUrl}')">
            </div>
            <div class="result-meta">
              <div class="result-meta-left">
                <div class="result-style-tag">${esc(styleLabel)}${esc(variantTag)}</div>
                <div class="result-mood">${esc(c.moodLabel || 'a figurine')}</div>
              </div>
              <div class="result-actions">
                <button class="result-btn primary" onclick="event.stopPropagation();downloadOne('${c.id}')">Download</button>
              </div>
            </div>
          </div>${warnHtml}`
}

function bringToFront(cardId) {
  const idx = state.stack.findIndex(c => c.id === cardId)
  if (idx <= 0) return
  const [card] = state.stack.splice(idx, 1)
  state.stack.unshift(card)
  state.activeId = cardId
  renderStack()
}

function retryCard(cardId) {
  const card = state.stack.find(c => c.id === cardId)
  if (!card) return
  state.stack = state.stack.filter(c => c.id !== cardId)
  renderStack()
  runStyle(card.style, card.variant || 'standard')
}

function downloadOne(cardId) {
  const card = state.stack.find(c => c.id === cardId)
  if (!card || !card.imageUrl) return
  const a = document.createElement('a')
  a.href = card.imageUrl
  a.download = `minirama-${card.style}${card.variant && card.variant !== 'standard' ? '-' + card.variant : ''}.jpg`
  a.click()
}

function downloadAll() {
  state.stack.filter(c => c.state === 'done').forEach((card, i) => {
    setTimeout(() => downloadOne(card.id), i * 200)
  })
}

function openLightbox(src) {
  const lb = document.createElement('div')
  lb.className = 'lightbox'
  lb.onclick = () => lb.remove()
  lb.innerHTML = `<img src="${src}">`
  document.body.appendChild(lb)
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liten &amp; Co — Landscapes (multi-source test rig)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #F4F1EA;
    --bg-soft:      #EDE8DD;
    --bg-deeper:    #E5DFD0;
    --ink:          #1F1B14;
    --ink-soft:     #5A5246;
    --ink-faint:    #8E8676;
    --hairline:     #D7CFBE;
    --hairline-soft:#E5DFD0;
    --accent:       #3F4A2E;
    --accent-soft:  #3F4A2E14;
    --signature:    #8B6F3E;
    --premium:      #5A5246;
    --base:         #8E8676;
    --error:        #8B3E3E;
    --error-soft:   #8B3E3E14;
    --success:      #3F4A2E;
    --warn:         #B07C2E;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink);
    font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--accent); color: var(--bg); }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }
  .hidden { display: none !important; }

  /* TOPBAR */
  .topbar {
    height: 48px; padding: 0 1.25rem;
    display: flex; align-items: center; gap: 1.25rem;
    border-bottom: 1px solid var(--hairline);
    background: var(--bg);
    position: sticky; top: 0; z-index: 50;
  }
  .home-link { font-family: 'Inter', sans-serif; font-size: 0.78rem; color: var(--ink-soft);
    text-decoration: none; letter-spacing: 0.02em; }
  .home-link:hover { color: var(--ink); }
  .brand-lockup { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
    color: var(--ink); display: flex; align-items: baseline; gap: 0.5rem; }
  .brand-name { font-style: italic; }
  .brand-name b { font-weight: 600; }
  .silo-name { font-family: 'Inter', sans-serif; font-size: 0.65rem;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint);
    border-left: 1px solid var(--hairline); padding-left: 0.75rem; }
  .test-tag { font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--warn); font-size: 0.85rem; }
  .topbar-spacer { flex: 1; }
  .status-pill { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-faint); }
  .status-pill.busy { color: var(--accent); }
  .status-pill.error { color: var(--error); }

  /* LAYOUT */
  .layout {
    display: grid; grid-template-columns: 460px 1fr;
    height: calc(100vh - 48px - 56px); /* topbar + bottom action bar */
    overflow: hidden;
  }
  .workspace {
    overflow-y: auto; padding: 1.25rem 1.25rem 2rem;
    border-right: 1px solid var(--hairline); background: var(--bg);
  }
  .stage {
    overflow-y: auto; padding: 1.25rem 1.5rem 3rem; background: var(--bg);
  }

  /* WORKSPACE — SOURCE LIST */
  .ws-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 0.5rem; margin-bottom: 0.875rem;
    border-bottom: 1px solid var(--hairline-soft);
  }
  .ws-title {
    font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft);
  }
  .ws-meta {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem;
    color: var(--ink-faint);
  }

  .source-list { display: flex; flex-direction: column; gap: 0.5rem; }

  /* Empty state */
  .source-empty-rail {
    border: 1px dashed var(--hairline); border-radius: 4px;
    padding: 1.5rem 1rem; text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .source-empty-rail:hover { border-color: var(--accent); background: var(--accent-soft); }
  .source-empty-rail .h {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem;
    color: var(--ink-soft); margin-bottom: 0.25rem;
  }
  .source-empty-rail .sub {
    font-size: 0.72rem; color: var(--ink-faint); letter-spacing: 0.04em;
  }

  /* Source card */
  .source-card {
    background: var(--bg-soft); border: 1px solid var(--hairline);
    border-radius: 4px; overflow: hidden; transition: border-color 0.15s;
  }
  .source-card.expanded { background: var(--bg); border-color: var(--ink-soft); }

  .source-card-head {
    display: flex; align-items: center; gap: 0.625rem;
    padding: 0.5rem 0.75rem; cursor: pointer;
  }
  .source-card-head:hover { background: var(--bg-deeper); }
  .source-card.expanded .source-card-head { background: transparent; cursor: default; }

  .source-thumb {
    width: 48px; height: 48px; border-radius: 3px;
    background: var(--bg-deeper); object-fit: cover; flex-shrink: 0;
    border: 1px solid var(--hairline-soft);
  }
  .source-card-name {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 0.1rem;
  }
  .source-card-filename {
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
    color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .source-card-summary {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.78rem;
    color: var(--ink-faint);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .source-card-toggle {
    background: none; border: none; padding: 0.25rem 0.4rem;
    color: var(--ink-faint); font-size: 0.85rem;
    flex-shrink: 0;
  }
  .source-card-toggle:hover { color: var(--ink); }
  .source-card-remove {
    background: none; border: none; padding: 0.25rem 0.4rem;
    color: var(--ink-faint); font-size: 0.95rem; line-height: 1;
    flex-shrink: 0;
  }
  .source-card-remove:hover { color: var(--error); }

  /* Expanded body */
  .source-card-body {
    padding: 0 0.875rem 0.875rem;
    display: flex; flex-direction: column; gap: 1rem;
    border-top: 1px solid var(--hairline-soft);
    padding-top: 0.875rem; margin-top: 0.25rem;
  }

  .field { display: flex; flex-direction: column; gap: 0.4rem; }
  .field-label {
    font-family: 'Inter', sans-serif; font-size: 0.66rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft);
  }
  .field-meta {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.78rem;
    color: var(--ink-faint);
  }

  /* Profile select */
  .profile-toggle {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    background: var(--bg-soft); border: 1px solid var(--hairline);
    border-radius: 4px; padding: 3px;
  }
  .source-card.expanded .profile-toggle { background: var(--bg-deeper); }
  .profile-btn {
    background: transparent; border: none; padding: 0.5rem 0.5rem;
    border-radius: 3px;
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500;
    color: var(--ink-soft); letter-spacing: 0.02em;
    transition: all 0.15s; line-height: 1.3;
  }
  .profile-btn .profile-italic {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-weight: 400; font-size: 0.85rem; margin-right: 0.2rem;
  }
  .profile-btn:hover:not(:disabled) { color: var(--ink); }
  .profile-btn.active { background: var(--ink); color: var(--bg); }
  .profile-hint {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.78rem;
    color: var(--ink-faint); margin-top: 0.3rem;
  }

  /* Path toggle (Natural / Sculpted) */
  .path-toggle {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    background: var(--bg-soft); border: 1px solid var(--hairline);
    border-radius: 4px; padding: 3px;
  }
  .source-card.expanded .path-toggle { background: var(--bg-deeper); }
  .path-btn {
    background: transparent; border: none; padding: 0.5rem 0.5rem;
    border-radius: 3px;
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500;
    color: var(--ink-soft); letter-spacing: 0.02em;
    transition: all 0.15s;
  }
  .path-btn .path-italic {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-weight: 400; font-size: 0.85rem; margin-right: 0.2rem;
  }
  .path-btn:hover:not(:disabled) { color: var(--ink); }
  .path-btn.active { background: var(--ink); color: var(--bg); }
  .path-btn:disabled { color: var(--ink-faint); cursor: not-allowed; opacity: 0.55; }

  /* Atmosphere tiles */
  .atm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.35rem; }
  .atm-tile {
    position: relative;
    background: var(--bg-soft); border: 1px solid var(--hairline);
    border-radius: 4px; padding: 0.5rem 0.625rem;
    text-align: left; cursor: pointer; transition: all 0.15s;
  }
  .source-card.expanded .atm-tile { background: var(--bg-deeper); }
  .atm-tile:hover:not(:disabled) { border-color: var(--ink-soft); background: var(--bg); }
  .atm-tile:disabled { cursor: not-allowed; opacity: 0.45; }
  .atm-name {
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500;
    color: var(--ink); margin-bottom: 0.05rem;
  }
  .atm-tier {
    font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint);
  }
  .atm-tier.tier-signature { color: var(--signature); }
  .atm-tier.tier-premium { color: var(--premium); }
  .atm-check {
    position: absolute; top: 0.25rem; right: 0.4rem;
    color: var(--accent); font-size: 0.78rem; font-weight: 600;
  }
  .atm-check-multi {
    background: var(--accent); color: var(--bg);
    border-radius: 99px; padding: 0.05rem 0.35rem;
    font-size: 0.6rem; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    top: 0.25rem; right: 0.3rem;
  }

  /* Pill groups (env, aspect) */
  .pill-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill {
    background: var(--bg-soft); border: 1px solid var(--hairline);
    border-radius: 99px; padding: 0.28rem 0.65rem;
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    color: var(--ink-soft); letter-spacing: 0.01em;
    transition: all 0.15s;
  }
  .source-card.expanded .pill { background: var(--bg-deeper); }
  .pill:hover:not(:disabled) { border-color: var(--ink-soft); color: var(--ink); }
  .pill.active { background: var(--ink); border-color: var(--ink); color: var(--bg); }
  .pill:disabled { opacity: 0.4; cursor: not-allowed; }

  .scale-readout {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 0.78rem; color: var(--ink-faint);
    padding: 0.2rem 0;
  }
  .scale-readout b {
    font-style: normal; font-family: 'Inter', sans-serif;
    font-size: 0.7rem; font-weight: 500; color: var(--ink);
    letter-spacing: 0.04em;
  }
  .scale-readout .lock-note {
    color: var(--warn); font-style: italic;
  }

  /* Per-source queue */
  .queue { display: flex; flex-direction: column; gap: 0.35rem; }
  .queue-empty {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--ink-faint); font-size: 0.85rem;
    padding: 0.5rem 0; text-align: center;
  }
  .queue-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.625rem;
    background: var(--bg-soft); border: 1px solid var(--hairline-soft);
    border-radius: 3px;
  }
  .source-card.expanded .queue-row { background: var(--bg-deeper); }
  .queue-row-name {
    flex: 1; min-width: 0;
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .queue-row-state {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 0.12rem 0.4rem; border-radius: 99px;
    flex-shrink: 0;
  }
  .state-idle    { color: var(--ink-faint); border: 1px solid var(--hairline); }
  .state-render  { color: var(--accent); border: 1px solid var(--accent); }
  .state-ready   { color: var(--success); border: 1px solid var(--success); }
  .state-error   { color: var(--error); border: 1px solid var(--error); }
  .queue-row-x {
    background: none; border: none; padding: 0.1rem 0.3rem;
    color: var(--ink-faint); font-size: 0.85rem; line-height: 1;
    flex-shrink: 0;
  }
  .queue-row-x:hover { color: var(--error); }

  /* STAGE */
  .stage-empty {
    height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0.875rem; padding: 2rem;
  }
  .stage-empty-h {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 2.2rem; color: var(--ink-soft); text-align: center;
  }
  .stage-empty-sub {
    font-family: 'Inter', sans-serif; font-size: 0.7rem;
    letter-spacing: 0.16em; color: var(--ink-faint); text-transform: uppercase;
  }

  .stage-section { margin-bottom: 2rem; }
  .stage-section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 0.5rem; margin-bottom: 0.875rem;
    border-bottom: 1px solid var(--hairline-soft);
  }
  .stage-section-title {
    font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .stage-section-source-name {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1rem; color: var(--ink); text-transform: none; letter-spacing: 0;
    font-weight: 400;
  }
  .stage-section-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    color: var(--ink-faint);
  }

  .renders-grid {
    display: grid; gap: 1rem;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }
  .render-card {
    background: var(--bg-soft); border: 1px solid var(--hairline);
    border-radius: 4px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 0.15s;
  }
  .render-card:hover { border-color: var(--ink-faint); }
  .render-card-img {
    width: 100%; aspect-ratio: 1; object-fit: cover; cursor: zoom-in;
    background: var(--bg-deeper); display: block;
  }
  .render-card-pending {
    width: 100%; aspect-ratio: 1; background: var(--bg-deeper);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--ink-faint); font-size: 1rem;
  }
  .render-card-meta { padding: 0.625rem 0.75rem 0.5rem; }
  .render-card-h {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem;
    color: var(--ink); margin: 0 0 0.1rem;
  }
  .render-card-sub {
    font-size: 0.68rem; color: var(--ink-faint); letter-spacing: 0.02em;
    font-family: 'JetBrains Mono', monospace;
  }
  .render-card-actions {
    display: flex; gap: 0.4rem; padding: 0 0.75rem 0.75rem; margin-top: auto;
  }
  .card-act {
    flex: 1; padding: 0.4rem 0.5rem;
    background: var(--bg); border: 1px solid var(--hairline);
    border-radius: 3px; color: var(--ink-soft);
    font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500;
  }
  .card-act:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .render-card.error { background: var(--bg); }
  .render-card-error {
    padding: 1.25rem; text-align: center;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--error); font-size: 0.9rem;
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 0.5rem;
  }
  .render-card-error-detail {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    color: var(--ink-faint); word-break: break-word; font-style: normal;
    max-width: 100%;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(31, 27, 20, 0.92);
    display: flex; align-items: center; justify-content: center; z-index: 200;
    padding: 2rem; cursor: zoom-out;
  }
  .lightbox img { max-width: 100%; max-height: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

  /* BOTTOM ACTION BAR */
  .actionbar {
    height: 56px; padding: 0 1.25rem;
    display: flex; align-items: center; gap: 1rem;
    background: var(--bg); border-top: 1px solid var(--hairline);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  }
  .render-all-btn {
    padding: 0.625rem 1.5rem; background: var(--ink); color: var(--bg);
    border: none; border-radius: 4px;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.02em; transition: all 0.15s;
  }
  .render-all-btn:hover:not(:disabled) { background: var(--accent); }
  .render-all-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .render-all-italic {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-weight: 400;
  }
  .actionbar-meta {
    flex: 1; font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--ink-faint); font-size: 0.9rem;
  }
  .actionbar-meta b {
    font-style: normal; font-family: 'JetBrains Mono', monospace;
    color: var(--ink); font-weight: 500; font-size: 0.78rem;
  }
  .errlog-btn {
    padding: 0.4rem 0.75rem; background: var(--bg-soft);
    border: 1px solid var(--hairline); border-radius: 3px;
    font-family: 'Inter', sans-serif; font-size: 0.75rem; color: var(--ink-soft);
    display: flex; align-items: center; gap: 0.4rem;
  }
  .errlog-btn:hover { border-color: var(--ink-soft); color: var(--ink); }
  .errlog-btn.has-errors { border-color: var(--error); color: var(--error); background: var(--error-soft); }
  .errlog-btn-count {
    background: var(--error); color: white;
    border-radius: 99px; padding: 0.05rem 0.4rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; font-weight: 600;
    min-width: 18px; text-align: center;
  }

  /* ERROR LOG PANEL */
  .errlog-panel {
    position: fixed; right: 1rem; bottom: 70px;
    width: 520px; max-width: calc(100vw - 2rem);
    max-height: 60vh;
    background: var(--bg); border: 1px solid var(--hairline);
    border-radius: 4px; box-shadow: 0 8px 32px rgba(31, 27, 20, 0.18);
    z-index: 40;
    display: flex; flex-direction: column;
  }
  .errlog-head {
    padding: 0.75rem 0.875rem;
    display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1px solid var(--hairline-soft);
    background: var(--bg-soft);
    flex-shrink: 0;
  }
  .errlog-title {
    font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft);
    flex: 1;
  }
  .errlog-action {
    background: none; border: 1px solid var(--hairline);
    border-radius: 3px; padding: 0.25rem 0.625rem;
    font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--ink-soft);
    transition: all 0.15s;
  }
  .errlog-action:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .errlog-action.copied {
    background: var(--success); color: var(--bg); border-color: var(--success);
  }
  .errlog-body {
    flex: 1; overflow-y: auto; padding: 0.75rem 0.875rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
    color: var(--ink); line-height: 1.55;
  }
  .errlog-empty {
    color: var(--ink-faint); font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 0.95rem; text-align: center;
    padding: 2rem 1rem;
  }
  .errlog-entry {
    padding: 0.5rem 0; border-bottom: 1px dashed var(--hairline-soft);
  }
  .errlog-entry:last-child { border-bottom: none; }
  .errlog-entry-head {
    color: var(--ink-faint); font-size: 0.65rem; margin-bottom: 0.2rem;
  }
  .errlog-entry-source {
    color: var(--ink); font-weight: 500; margin-bottom: 0.2rem;
  }
  .errlog-entry-cfg {
    color: var(--ink-soft); font-size: 0.68rem; margin-bottom: 0.25rem;
  }
  .errlog-entry-err {
    color: var(--error); word-break: break-word;
    background: var(--error-soft); padding: 0.25rem 0.4rem;
    border-radius: 2px; border-left: 2px solid var(--error);
  }

  input[type="file"] { display: none; }

  /* Drag overlay */
  body.dragging::after {
    content: "drop sources to add";
    position: fixed; inset: 0; background: rgba(63, 74, 46, 0.92);
    color: white; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 3rem; pointer-events: none;
  }
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="home-link">← Liten &amp; Co</a>
  <div class="brand-lockup">
    <span class="brand-name"><i>Liten</i> &amp; <b>Co</b></span>
  </div>
  <span class="silo-name">Landscapes</span>
  <span class="test-tag">multi-source test rig</span>
  <div class="topbar-spacer"></div>
  <span class="status-pill" id="status-pill">ready</span>
</header>

<div class="layout">

  <!-- WORKSPACE — SOURCE LIST -->
  <aside class="workspace">
    <div class="ws-head">
      <span class="ws-title">Sources</span>
      <span class="ws-meta" id="ws-meta">none yet</span>
    </div>
    <div class="source-list" id="source-list"></div>
    <input type="file" id="file-input" accept="image/jpeg,image/png" multiple>
  </aside>

  <!-- STAGE — RENDERS GROUPED BY SOURCE -->
  <main class="stage" id="stage">
    <div class="stage-empty" id="stage-empty">
      <div class="stage-empty-h">Your renders will appear here</div>
      <div class="stage-empty-sub">add sources · queue atmospheres · render</div>
    </div>
    <div id="stage-sections"></div>
  </main>

</div>

<!-- BOTTOM ACTION BAR -->
<footer class="actionbar">
  <button class="render-all-btn" id="render-all-btn" disabled>
    <span class="render-all-italic">render</span> all queued
  </button>
  <div class="actionbar-meta" id="actionbar-meta">add a source to begin</div>
  <button class="errlog-btn" id="errlog-btn">
    error log
    <span class="errlog-btn-count hidden" id="errlog-count">0</span>
  </button>
</footer>

<!-- ERROR LOG PANEL -->
<div class="errlog-panel hidden" id="errlog-panel">
  <div class="errlog-head">
    <span class="errlog-title">Error log</span>
    <button class="errlog-action" id="errlog-copy">copy</button>
    <button class="errlog-action" id="errlog-clear">clear</button>
    <button class="errlog-action" id="errlog-close">close</button>
  </div>
  <div class="errlog-body" id="errlog-body"></div>
</div>

<div class="lightbox hidden" id="lightbox"></div>

<script>
'use strict';

// ──────────────────────────────────────────────────────────────
// CATALOG (wire-aligned with lib/v1/landscape-shared.ts)
// ──────────────────────────────────────────────────────────────
const ATMOSPHERES = [
  { id: 'golden',         label: 'Golden Hour',     tier: 'base',      enabled: true  },
  { id: 'peaceful_dawn',  label: 'Peaceful Dawn',   tier: 'base',      enabled: false },
  { id: 'vivid_midday',   label: 'Vivid Midday',    tier: 'base',      enabled: false },
  { id: 'dusk_blue_hour', label: 'Dusk',            tier: 'base',      enabled: false },
  { id: 'dramatic_storm', label: 'Dramatic Storm',  tier: 'premium',   enabled: false },
  { id: 'fog_rolled_in',  label: 'Fog',             tier: 'premium',   enabled: false },
  { id: 'after_rain',     label: 'After Rain',      tier: 'premium',   enabled: false },
  { id: 'snow_falling',   label: 'Snow Falling',    tier: 'premium',   enabled: false },
  { id: 'deep_night',     label: 'Deep Night',      tier: 'premium',   enabled: false },
  { id: 'aurora_surreal', label: 'Aurora',          tier: 'signature', enabled: false },
];

const ENVIRONMENTS = [
  { id: 'desk',    label: 'On Desk',  enabled: true  },
  { id: 'in_situ', label: 'In Situ',  enabled: false },
  { id: 'gallery', label: 'Gallery',  enabled: false },
];

const ASPECTS = ['1:1', '3:2', '2:3', '4:3', '3:4', '16:9'];

// Scale resolution rules — auto-derived from path + profile.
//   natural + standard      → zoom_out (65%)  [landscape feel]
//   natural + low_profile   → close_up (80%)  [compensation: tight on foreground]
//   sculpted + *            → close_up (80%)  [material detail]
function resolveScale(path, profile) {
  if (path === 'natural' && profile === 'low_profile') return 'close_up';
  if (path === 'natural') return 'zoom_out';
  return 'close_up';
}
const SCALE_LABELS = {
  close_up: 'Close up · 80%',
  zoom_out: 'Zoom out · 65%',
  subject:  'Subject · 90%',
};

const PROFILES = [
  { id: 'standard',    label: 'Standard',     hint: 'Source has vertical elements (trees, buildings, mountains).' },
  { id: 'low_profile', label: 'Low-profile',  hint: 'Flat-horizon source (road, beach, field). Camera tilts steeper, scale locks to close-up.' },
];

const PATH_PRESET = {
  natural: 'as_itself',
};

// ──────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────
const state = {
  sources:  [],   // [{ id, file: {b64, name}, profile, env, aspect, path, queue, expanded }]
  errorLog: [],   // [{ ts, sourceName, config, error, durationMs }]
  busy:     false,
};
let sourceIdSeq = 1;
let rowIdSeq = 1;

// ──────────────────────────────────────────────────────────────
// FILE I/O
// ──────────────────────────────────────────────────────────────
function fileToB64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const s = String(r.result);
      resolve(s.slice(s.indexOf(',') + 1));
    };
    r.onerror = () => reject(new Error('read_failed'));
    r.readAsDataURL(file);
  });
}
function mimeOf(name) { return /\.png$/i.test(name || '') ? 'image/png' : 'image/jpeg'; }

async function addFiles(fileList) {
  const files = Array.from(fileList || []).filter(f => /^image\/(jpeg|png)$/.test(f.type));
  if (!files.length) return;
  for (const f of files) {
    try {
      const b64 = await fileToB64(f);
      const newSource = {
        id:       `s${sourceIdSeq++}`,
        file:     { b64, name: f.name },
        profile:  'standard',
        env:      'desk',
        aspect:   '1:1',
        path:     'natural',
        queue:    [],
        expanded: state.sources.length === 0,  // first source expands automatically
      };
      // collapse others if this one is expanding
      if (newSource.expanded) state.sources.forEach(s => { s.expanded = false; });
      state.sources.push(newSource);
    } catch (err) {
      pushError({
        sourceName: f.name,
        config:     null,
        error:      `could not read file: ${err.message || err}`,
      });
    }
  }
  renderAll();
}

// ──────────────────────────────────────────────────────────────
// SOURCE CARD MUTATIONS
// ──────────────────────────────────────────────────────────────
function expandSource(sourceId) {
  state.sources.forEach(s => { s.expanded = (s.id === sourceId); });
  renderSourceList();
}
function collapseSource(sourceId) {
  const s = state.sources.find(s => s.id === sourceId);
  if (s) s.expanded = false;
  renderSourceList();
}
function removeSource(sourceId) {
  if (state.busy) return;
  state.sources = state.sources.filter(s => s.id !== sourceId);
  renderAll();
}
function setSourceField(sourceId, field, value) {
  const s = state.sources.find(s => s.id === sourceId);
  if (!s) return;
  s[field] = value;
  renderAll();
}
function addQueueRow(sourceId, atmosphereId) {
  const s = state.sources.find(s => s.id === sourceId);
  if (!s) return;
  s.queue.push({
    id:           `r${rowIdSeq++}`,
    atmosphereId: atmosphereId,
    status:       'idle',
    result:       null,
    error:        null,
  });
  renderAll();
}
function removeQueueRow(sourceId, rowId) {
  if (state.busy) return;
  const s = state.sources.find(s => s.id === sourceId);
  if (!s) return;
  s.queue = s.queue.filter(r => r.id !== rowId);
  renderAll();
}

// ──────────────────────────────────────────────────────────────
// ERROR LOG
// ──────────────────────────────────────────────────────────────
function pushError(entry) {
  state.errorLog.push({
    ts:         new Date().toISOString(),
    sourceName: entry.sourceName,
    config:     entry.config,
    error:      String(entry.error || 'unknown error'),
    durationMs: entry.durationMs || null,
  });
  renderErrorLog();
  renderActionbar();
}

function formatErrorLogEntry(e) {
  const ts = e.ts.replace('T', ' ').replace(/\.\d{3}Z$/, 'Z');
  let cfgLine = '  config:    n/a';
  if (e.config) {
    const parts = [];
    if (e.config.path)         parts.push(`path=${e.config.path}`);
    if (e.config.profile)      parts.push(`profile=${e.config.profile}`);
    if (e.config.atmosphere)   parts.push(`atmosphere=${e.config.atmosphere}`);
    if (e.config.environment)  parts.push(`env=${e.config.environment}`);
    if (e.config.scale)        parts.push(`scale=${e.config.scale}`);
    if (e.config.aspect)       parts.push(`aspect=${e.config.aspect}`);
    cfgLine = `  config:    ${parts.join(' · ')}`;
  }
  const dur = e.durationMs != null ? `\n  duration:  ${(e.durationMs / 1000).toFixed(1)}s` : '';
  return [
    `[${ts}] ${e.sourceName}`,
    cfgLine,
    `  error:     ${e.error}${dur}`,
  ].join('\n');
}

function buildErrorLogText() {
  if (!state.errorLog.length) return 'no errors logged';
  const header = `LITEN & CO — LANDSCAPES — ERROR LOG\nexported ${new Date().toISOString()}\nentries: ${state.errorLog.length}\n`;
  const sep = '─'.repeat(60);
  return [header, sep, ...state.errorLog.map(formatErrorLogEntry)].join('\n');
}

// ──────────────────────────────────────────────────────────────
// RENDER — workspace
// ──────────────────────────────────────────────────────────────
function renderAll() {
  renderSourceList();
  renderStage();
  renderActionbar();
}

function renderSourceList() {
  const list = document.getElementById('source-list');
  const meta = document.getElementById('ws-meta');
  list.innerHTML = '';

  if (!state.sources.length) {
    meta.textContent = 'none yet';
    const empty = document.createElement('div');
    empty.className = 'source-empty-rail';
    empty.innerHTML = `
      <div class="h">drop sources, or click to upload</div>
      <div class="sub">JPG or PNG · multiple at once · drag-drop anywhere</div>
    `;
    empty.addEventListener('click', () => document.getElementById('file-input').click());
    list.appendChild(empty);
    return;
  }

  meta.textContent = state.sources.length === 1 ? '1 source' : `${state.sources.length} sources`;

  state.sources.forEach(src => {
    const card = document.createElement('div');
    card.className = 'source-card' + (src.expanded ? ' expanded' : '');
    if (src.expanded) {
      card.appendChild(renderSourceHead(src));
      card.appendChild(renderSourceBody(src));
    } else {
      card.appendChild(renderSourceHead(src));
    }
    list.appendChild(card);
  });

  // Add-source button at bottom
  const add = document.createElement('button');
  add.className = 'source-empty-rail';
  add.style.cssText = 'background: transparent; cursor: pointer; padding: 0.875rem 1rem; margin-top: 0.4rem;';
  add.innerHTML = `
    <div class="sub">+ ADD SOURCE</div>
  `;
  add.addEventListener('click', () => document.getElementById('file-input').click());
  list.appendChild(add);
}

function renderSourceHead(src) {
  const head = document.createElement('div');
  head.className = 'source-card-head';

  const stats = summaryFor(src);

  head.innerHTML = `
    <img class="source-thumb" src="data:${mimeOf(src.file.name)};base64,${src.file.b64}" alt="">
    <div class="source-card-name">
      <span class="source-card-filename">${escapeHtml(src.file.name)}</span>
      <span class="source-card-summary">${stats}</span>
    </div>
    <button class="source-card-toggle" data-action="${src.expanded ? 'collapse' : 'expand'}" title="${src.expanded ? 'collapse' : 'expand'}">
      ${src.expanded ? '▴' : '▾'}
    </button>
    <button class="source-card-remove" title="remove source">×</button>
  `;

  head.querySelector('.source-card-toggle').addEventListener('click', e => {
    e.stopPropagation();
    if (src.expanded) collapseSource(src.id); else expandSource(src.id);
  });
  head.querySelector('.source-card-remove').addEventListener('click', e => {
    e.stopPropagation();
    removeSource(src.id);
  });
  if (!src.expanded) {
    head.addEventListener('click', () => expandSource(src.id));
  }

  return head;
}

function renderSourceBody(src) {
  const body = document.createElement('div');
  body.className = 'source-card-body';

  const scale = resolveScale(src.path, src.profile);
  const profileObj = PROFILES.find(p => p.id === src.profile);
  const isLowProfile = src.profile === 'low_profile';

  body.innerHTML = `
    <!-- Source profile -->
    <div class="field">
      <span class="field-label">Source profile</span>
      <div class="profile-toggle" data-field="profile">
        ${PROFILES.map(p => `
          <button class="profile-btn ${src.profile === p.id ? 'active' : ''}" data-id="${p.id}" ${state.busy ? 'disabled' : ''}>
            <span class="profile-italic">${p.label}</span>
          </button>
        `).join('')}
      </div>
      <div class="profile-hint">${profileObj?.hint || ''}</div>
    </div>

    <!-- Path -->
    <div class="field">
      <span class="field-label">Path</span>
      <div class="path-toggle" data-field="path">
        <button class="path-btn ${src.path === 'natural' ? 'active' : ''}" data-id="natural" ${state.busy ? 'disabled' : ''}>
          <span class="path-italic">Natural</span>as itself
        </button>
        <button class="path-btn" data-id="sculpted" disabled>
          <span class="path-italic">Sculpted</span>coming soon
        </button>
      </div>
    </div>

    <!-- Atmosphere -->
    <div class="field">
      <span class="field-label">Atmosphere <span class="field-meta">— click to queue a render</span></span>
      <div class="atm-grid">
        ${ATMOSPHERES.map(a => {
          const count = src.queue.filter(r => r.atmosphereId === a.id).length;
          let badge = '';
          if (count === 1)      badge = `<span class="atm-check">✓</span>`;
          else if (count > 1)   badge = `<span class="atm-check atm-check-multi">✓ ${count}</span>`;
          const tierClass = a.tier === 'signature' ? 'tier-signature' : a.tier === 'premium' ? 'tier-premium' : '';
          return `
            <button class="atm-tile" data-id="${a.id}" ${(!a.enabled || state.busy) ? 'disabled' : ''}>
              <div class="atm-name">${a.label}</div>
              <div class="atm-tier ${tierClass}">${a.tier}${a.enabled ? '' : ' · soon'}</div>
              ${badge}
            </button>
          `;
        }).join('')}
      </div>
    </div>

    <!-- Setting -->
    <div class="field">
      <span class="field-label">Setting</span>
      <div class="pill-group" data-field="env">
        ${ENVIRONMENTS.map(e => `
          <button class="pill ${src.env === e.id ? 'active' : ''}" data-id="${e.id}" ${(!e.enabled || state.busy) ? 'disabled' : ''}>
            ${e.label}${e.enabled ? '' : ' · soon'}
          </button>
        `).join('')}
      </div>
    </div>

    <!-- Aspect -->
    <div class="field">
      <span class="field-label">Aspect ratio</span>
      <div class="pill-group" data-field="aspect">
        ${ASPECTS.map(a => `
          <button class="pill ${src.aspect === a ? 'active' : ''}" data-id="${a}" ${state.busy ? 'disabled' : ''}>
            ${a}
          </button>
        `).join('')}
      </div>
    </div>

    <!-- Scale readout -->
    <div class="scale-readout">
      Scale: <b>${SCALE_LABELS[scale]}</b>
      ${isLowProfile ? `<span class="lock-note"> — locked by low-profile compensation</span>` : ''}
    </div>

    <!-- Per-source queue -->
    <div class="field">
      <span class="field-label">Queue <span class="field-meta">— ${src.queue.length || 'none'} render${src.queue.length === 1 ? '' : 's'}</span></span>
      <div class="queue">
        ${src.queue.length === 0 ? `<div class="queue-empty">click an atmosphere above to queue a render</div>` : ''}
        ${src.queue.map(r => {
          const atm = ATMOSPHERES.find(a => a.id === r.atmosphereId);
          const stateClass = `state-${r.status}`;
          const stateText = r.status === 'render' ? 'rendering'
                          : r.status === 'ready'  ? 'ready'
                          : r.status === 'error'  ? 'error'
                          : 'queued';
          return `
            <div class="queue-row">
              <span class="queue-row-name">${atm?.label || r.atmosphereId}</span>
              <span class="queue-row-state ${stateClass}">${stateText}</span>
              <button class="queue-row-x" data-row="${r.id}" title="remove">×</button>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

  // Wire up handlers
  body.querySelectorAll('.profile-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      setSourceField(src.id, 'profile', btn.dataset.id);
    });
  });
  body.querySelectorAll('.path-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      setSourceField(src.id, 'path', btn.dataset.id);
    });
  });
  body.querySelectorAll('.atm-tile').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      addQueueRow(src.id, btn.dataset.id);
    });
  });
  body.querySelectorAll('[data-field="env"] .pill').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      setSourceField(src.id, 'env', btn.dataset.id);
    });
  });
  body.querySelectorAll('[data-field="aspect"] .pill').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      setSourceField(src.id, 'aspect', btn.dataset.id);
    });
  });
  body.querySelectorAll('.queue-row-x').forEach(btn => {
    btn.addEventListener('click', () => removeQueueRow(src.id, btn.dataset.row));
  });

  return body;
}

function summaryFor(src) {
  if (!src.queue.length) {
    const profileSuffix = src.profile === 'low_profile' ? ' · low-profile' : '';
    return `no renders queued${profileSuffix}`;
  }
  const counts = { idle: 0, render: 0, ready: 0, error: 0 };
  src.queue.forEach(r => { counts[r.status]++; });
  const parts = [];
  if (counts.ready)  parts.push(`${counts.ready} ready`);
  if (counts.render) parts.push(`${counts.render} rendering`);
  if (counts.idle)   parts.push(`${counts.idle} queued`);
  if (counts.error)  parts.push(`${counts.error} error`);
  return parts.join(' · ');
}

// ──────────────────────────────────────────────────────────────
// RENDER — stage
// ──────────────────────────────────────────────────────────────
function renderStage() {
  const empty = document.getElementById('stage-empty');
  const sections = document.getElementById('stage-sections');
  sections.innerHTML = '';

  // Show empty state if no source has any queued renders
  const sourcesWithQueue = state.sources.filter(s => s.queue.length > 0);
  if (!sourcesWithQueue.length) {
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  sourcesWithQueue.forEach(src => {
    const sec = document.createElement('section');
    sec.className = 'stage-section';

    const counts = { idle: 0, render: 0, ready: 0, error: 0 };
    src.queue.forEach(r => { counts[r.status]++; });
    const metaParts = [];
    if (counts.ready)  metaParts.push(`${counts.ready} ready`);
    if (counts.render) metaParts.push(`${counts.render} rendering`);
    if (counts.idle)   metaParts.push(`${counts.idle} queued`);
    if (counts.error)  metaParts.push(`${counts.error} error`);

    const scale = resolveScale(src.path, src.profile);
    const profileTag = src.profile === 'low_profile' ? ' · low-profile' : '';

    sec.innerHTML = `
      <div class="stage-section-head">
        <div class="stage-section-title">
          Source:
          <span class="stage-section-source-name">${escapeHtml(src.file.name)}</span>
        </div>
        <span class="stage-section-meta">${metaParts.join(' · ') || 'idle'}${profileTag}</span>
      </div>
      <div class="renders-grid"></div>
    `;

    const grid = sec.querySelector('.renders-grid');
    src.queue.forEach(row => grid.appendChild(renderResultCard(src, row, scale)));
    sections.appendChild(sec);
  });
}

function renderResultCard(src, row, scale) {
  const card = document.createElement('div');
  card.className = 'render-card' + (row.status === 'error' ? ' error' : '');
  const atm = ATMOSPHERES.find(a => a.id === row.atmosphereId);
  const sub = `${ENVIRONMENTS.find(e => e.id === src.env)?.label || src.env} · ${src.aspect} · ${SCALE_LABELS[scale].split(' · ')[0]}${src.profile === 'low_profile' ? ' · low-profile' : ''}`;

  if (row.status === 'ready' && row.result?.image_b64) {
    card.innerHTML = `
      <img class="render-card-img" src="data:image/jpeg;base64,${row.result.image_b64}" data-src="${src.id}" data-row="${row.id}">
      <div class="render-card-meta">
        <h3 class="render-card-h">${atm?.label || row.atmosphereId}</h3>
        <div class="render-card-sub">${sub}</div>
      </div>
      <div class="render-card-actions">
        <button class="card-act" data-act="download">download</button>
        <button class="card-act" data-act="zoom">view full</button>
      </div>
    `;
    card.querySelector('.render-card-img').addEventListener('click', e => {
      openLightbox(e.target.src);
    });
    card.querySelectorAll('.card-act').forEach(b => {
      b.addEventListener('click', () => {
        if (b.dataset.act === 'download') downloadResult(src, row, atm);
        else if (b.dataset.act === 'zoom') openLightbox(`data:image/jpeg;base64,${row.result.image_b64}`);
      });
    });
  } else if (row.status === 'error') {
    card.innerHTML = `
      <div class="render-card-error">
        something went wrong
        <div class="render-card-error-detail">${escapeHtml(row.error || 'unknown error')}</div>
      </div>
      <div class="render-card-meta">
        <h3 class="render-card-h">${atm?.label || row.atmosphereId}</h3>
        <div class="render-card-sub">${sub}</div>
      </div>
    `;
  } else {
    const label = row.status === 'render' ? 'rendering…' : 'queued';
    card.innerHTML = `
      <div class="render-card-pending">${label}</div>
      <div class="render-card-meta">
        <h3 class="render-card-h">${atm?.label || row.atmosphereId}</h3>
        <div class="render-card-sub">${sub}</div>
      </div>
    `;
  }
  return card;
}

function downloadResult(src, row, atm) {
  if (!row.result?.image_b64) return;
  const link = document.createElement('a');
  link.href = `data:image/jpeg;base64,${row.result.image_b64}`;
  const stem = src.file.name.replace(/\.[^.]+$/, '');
  const a = (atm?.id || 'render').replace(/_/g, '-');
  link.download = `${stem}_${a}_${src.profile}.jpg`;
  link.click();
}

// ──────────────────────────────────────────────────────────────
// RENDER — actionbar + errlog
// ──────────────────────────────────────────────────────────────
function renderActionbar() {
  const meta = document.getElementById('actionbar-meta');
  const btn = document.getElementById('render-all-btn');

  const totalSources = state.sources.length;
  const totalQueued = state.sources.reduce((n, s) => n + s.queue.filter(r => r.status === 'idle').length, 0);
  const totalReady = state.sources.reduce((n, s) => n + s.queue.filter(r => r.status === 'ready').length, 0);
  const totalErr = state.sources.reduce((n, s) => n + s.queue.filter(r => r.status === 'error').length, 0);

  if (!totalSources) {
    meta.innerHTML = 'add a source to begin';
  } else if (state.busy) {
    meta.innerHTML = `rendering across <b>${totalSources}</b> source${totalSources === 1 ? '' : 's'}…`;
  } else if (totalQueued === 0 && (totalReady > 0 || totalErr > 0)) {
    meta.innerHTML = `<b>${totalSources}</b> source${totalSources === 1 ? '' : 's'} · <b>${totalReady}</b> ready${totalErr ? ` · <b>${totalErr}</b> error` : ''}`;
  } else {
    meta.innerHTML = `<b>${totalSources}</b> source${totalSources === 1 ? '' : 's'} · <b>${totalQueued}</b> queued`;
  }

  btn.disabled = state.busy || totalQueued === 0;

  // status pill
  const sp = document.getElementById('status-pill');
  if (state.busy) { sp.textContent = 'rendering…'; sp.className = 'status-pill busy'; }
  else if (totalErr) { sp.textContent = `${totalErr} error${totalErr === 1 ? '' : 's'}`; sp.className = 'status-pill error'; }
  else { sp.textContent = 'ready'; sp.className = 'status-pill'; }
}

function renderErrorLog() {
  const body = document.getElementById('errlog-body');
  const count = document.getElementById('errlog-count');
  const btn = document.getElementById('errlog-btn');

  if (state.errorLog.length) {
    count.textContent = String(state.errorLog.length);
    count.classList.remove('hidden');
    btn.classList.add('has-errors');
  } else {
    count.classList.add('hidden');
    btn.classList.remove('has-errors');
  }

  body.innerHTML = '';
  if (!state.errorLog.length) {
    const empty = document.createElement('div');
    empty.className = 'errlog-empty';
    empty.textContent = 'no errors logged yet';
    body.appendChild(empty);
    return;
  }

  state.errorLog.forEach(e => {
    const entry = document.createElement('div');
    entry.className = 'errlog-entry';
    const ts = e.ts.replace('T', ' ').replace(/\.\d{3}Z$/, 'Z');
    let cfgStr = '';
    if (e.config) {
      const parts = [];
      if (e.config.path)        parts.push(`path=${e.config.path}`);
      if (e.config.profile)     parts.push(`profile=${e.config.profile}`);
      if (e.config.atmosphere)  parts.push(`atm=${e.config.atmosphere}`);
      if (e.config.environment) parts.push(`env=${e.config.environment}`);
      if (e.config.scale)       parts.push(`scale=${e.config.scale}`);
      if (e.config.aspect)      parts.push(`aspect=${e.config.aspect}`);
      cfgStr = parts.join(' · ');
    }
    const dur = e.durationMs != null ? ` · ${(e.durationMs / 1000).toFixed(1)}s` : '';
    entry.innerHTML = `
      <div class="errlog-entry-head">${escapeHtml(ts)}${dur}</div>
      <div class="errlog-entry-source">${escapeHtml(e.sourceName)}</div>
      ${cfgStr ? `<div class="errlog-entry-cfg">${escapeHtml(cfgStr)}</div>` : ''}
      <div class="errlog-entry-err">${escapeHtml(e.error)}</div>
    `;
    body.appendChild(entry);
  });
}

// ──────────────────────────────────────────────────────────────
// LIGHTBOX
// ──────────────────────────────────────────────────────────────
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  lb.innerHTML = `<img src="${src}" alt="">`;
  lb.classList.remove('hidden');
  lb.onclick = () => lb.classList.add('hidden');
}

// ──────────────────────────────────────────────────────────────
// RUN
// ──────────────────────────────────────────────────────────────
async function runAll() {
  if (state.busy) return;
  const sourcesToRun = state.sources.filter(s => s.queue.some(r => r.status === 'idle'));
  if (!sourcesToRun.length) return;

  state.busy = true;
  renderAll();

  // Mark all idle queue rows as 'render'
  sourcesToRun.forEach(src => {
    src.queue.forEach(r => { if (r.status === 'idle') r.status = 'render'; });
  });
  renderAll();

  // Fire all sources in parallel — one request per source
  await Promise.allSettled(sourcesToRun.map(runSource));

  state.busy = false;
  renderAll();
}

async function runSource(src) {
  const startedAt = Date.now();
  const renderingRows = src.queue.filter(r => r.status === 'render');
  const scale = resolveScale(src.path, src.profile);

  const renders = renderingRows.map(r => ({
    preset_id:         PATH_PRESET[src.path] || 'as_itself',
    environment_id:    src.env,
    atmosphere_id:     r.atmosphereId,
    scale_id:          scale,
    tod:               'day',
    aspect_ratio:      src.aspect,
    source_profile_id: src.profile,
  }));

  const body = {
    source_image_b64:      src.file.b64,
    additional_images_b64: undefined,
    renders,
    expand:                true,
  };

  try {
    const res = await fetch('/api/v1/landscapes/generate', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();
    const dur = Date.now() - startedAt;

    if (data.status === 'deferred') {
      // capacity — return rows to idle so user can retry
      renderingRows.forEach(r => { r.status = 'idle'; });
      pushError({
        sourceName: src.file.name,
        config:     null,
        error:      `studio at capacity (deferred, job ${data.job_id || 'unknown'})`,
        durationMs: dur,
      });
    } else if (data.status !== 'ok') {
      const errMsg = data.error || (data.errors || []).join('; ') || 'render_failed';
      renderingRows.forEach(r => {
        r.status = 'error';
        r.error  = errMsg;
        const atm = ATMOSPHERES.find(a => a.id === r.atmosphereId);
        pushError({
          sourceName: src.file.name,
          config:     {
            path:        src.path, profile: src.profile,
            atmosphere:  atm?.label || r.atmosphereId,
            environment: src.env, scale, aspect: src.aspect,
          },
          error:      errMsg,
          durationMs: dur,
        });
      });
    } else {
      // map results back onto rendering rows in send order
      data.results.forEach((res, i) => {
        const row = renderingRows[i];
        if (!row) return;
        if (res.ok && res.image_b64) {
          row.status = 'ready';
          row.result = res;
          row.error  = null;
        } else {
          row.status = 'error';
          row.error  = res.error || 'unknown error';
          const atm = ATMOSPHERES.find(a => a.id === row.atmosphereId);
          pushError({
            sourceName: src.file.name,
            config:     {
              path:        src.path, profile: src.profile,
              atmosphere:  atm?.label || row.atmosphereId,
              environment: src.env, scale, aspect: src.aspect,
            },
            error:      res.error || 'unknown error',
            durationMs: dur,
          });
        }
      });
    }
  } catch (err) {
    const dur = Date.now() - startedAt;
    console.error('[runSource]', src.file.name, err);
    renderingRows.forEach(r => {
      r.status = 'error';
      r.error  = err.message || String(err);
    });
    pushError({
      sourceName: src.file.name,
      config:     {
        path: src.path, profile: src.profile,
        environment: src.env, scale, aspect: src.aspect,
      },
      error:      `network error: ${err.message || err}`,
      durationMs: dur,
    });
  }
}

// ──────────────────────────────────────────────────────────────
// EVENTS
// ──────────────────────────────────────────────────────────────
const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', async e => {
  await addFiles(e.target.files);
  fileInput.value = '';
});

document.getElementById('render-all-btn').addEventListener('click', runAll);

// Drag-drop anywhere
let dragDepth = 0;
document.addEventListener('dragenter', e => {
  if (!e.dataTransfer?.types?.includes('Files')) return;
  e.preventDefault();
  dragDepth++;
  document.body.classList.add('dragging');
});
document.addEventListener('dragleave', e => {
  if (!e.dataTransfer?.types?.includes('Files')) return;
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) document.body.classList.remove('dragging');
});
document.addEventListener('dragover', e => {
  if (!e.dataTransfer?.types?.includes('Files')) return;
  e.preventDefault();
});
document.addEventListener('drop', async e => {
  if (!e.dataTransfer?.files?.length) return;
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove('dragging');
  await addFiles(e.dataTransfer.files);
});

// Error log panel
const errlogBtn = document.getElementById('errlog-btn');
const errlogPanel = document.getElementById('errlog-panel');
errlogBtn.addEventListener('click', () => {
  errlogPanel.classList.toggle('hidden');
});
document.getElementById('errlog-close').addEventListener('click', () => {
  errlogPanel.classList.add('hidden');
});
document.getElementById('errlog-copy').addEventListener('click', async () => {
  const txt = buildErrorLogText();
  try {
    await navigator.clipboard.writeText(txt);
    const btn = document.getElementById('errlog-copy');
    btn.classList.add('copied');
    btn.textContent = 'copied ✓';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = 'copy';
    }, 1500);
  } catch (err) {
    // fallback: select & prompt
    window.prompt('Copy error log:', txt);
  }
});
document.getElementById('errlog-clear').addEventListener('click', () => {
  if (!confirm('Clear all error log entries?')) return;
  state.errorLog = [];
  renderErrorLog();
  renderActionbar();
});

// ──────────────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );
}

// ──────────────────────────────────────────────────────────────
// BOOT
// ──────────────────────────────────────────────────────────────
renderAll();
renderErrorLog();
</script>

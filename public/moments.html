<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moments — Group Diorama Test</title>
<style>
  :root {
    --cream: #F7F2EA;
    --surface: #2F3236;
    --surface-2: #3A3D42;
    --border: #4A4E54;
    --dim: #8A8F96;
    --muted: #B8BCC2;
    --stage: #2A2D30;
    --accent: #C97B5E;
    --accent-bright: #E08C6E;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    --serif: 'Newsreader', Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--stage); color: var(--cream); font-family: var(--mono); font-size: 14px; }
  body { display: flex; flex-direction: column; }

  header { padding: 1rem 1.5rem; background: var(--cream); color: #1a1a1a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #d4cfc4; }
  header h1 { margin: 0; font-family: var(--serif); font-size: 1.4rem; font-weight: 500; letter-spacing: -0.01em; }
  header .badge { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #6a6356; padding: 0.25rem 0.6rem; background: rgba(0,0,0,0.04); border-radius: 3px; }

  .layout { flex: 1; display: grid; grid-template-columns: 360px 1fr; min-height: 0; }

  .panel { background: var(--cream); color: #1a1a1a; padding: 1rem 1.25rem; overflow-y: auto; border-right: 1px solid #d4cfc4; display: flex; flex-direction: column; gap: 1rem; }

  .stage { padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; align-items: center; }

  label { display: block; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6a6356; margin-bottom: 0.35rem; }

  input[type="file"], input[type="text"], textarea {
    width: 100%; padding: 0.55rem 0.7rem; border: 1.5px solid #d4cfc4; border-radius: 6px;
    background: #fff; color: #1a1a1a; font-family: var(--mono); font-size: 0.8rem; outline: none;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; font-family: var(--serif); font-size: 0.85rem; }

  .btn { padding: 0.7rem 1rem; border: none; border-radius: 6px; font-family: var(--mono); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #1a1a1a; color: var(--cream); }
  .btn-primary:hover:not(:disabled) { background: #2d2d2d; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .preview-thumb { max-width: 100%; border-radius: 6px; border: 1px solid #d4cfc4; }

  .result-card {
    background: #fff; border-radius: 8px; padding: 1rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    color: #1a1a1a; max-width: 720px; width: 100%;
  }
  .result-card img { width: 100%; border-radius: 6px; display: block; }
  .result-card .meta { margin-top: 0.75rem; font-size: 0.7rem; color: #6a6356; line-height: 1.5; display: flex; flex-direction: column; gap: 0.2rem; }
  .result-card .meta strong { color: #1a1a1a; font-weight: 700; }

  .progress {
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    padding: 3rem 2rem; max-width: 480px; width: 100%;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  }
  .progress-skeleton {
    width: 100%; aspect-ratio: 1; border-radius: 6px;
    background: linear-gradient(90deg, var(--surface-2) 25%, #4a4e54 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 2s infinite linear;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .progress-stage { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.04em; }
  .progress-timer { font-size: 1.4rem; color: var(--accent-bright); font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .progress-hint { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; }

  .empty { color: var(--dim); font-size: 0.8rem; text-align: center; padding: 2rem; font-family: var(--serif); font-style: italic; }
  .error { color: #d97a6c; font-size: 0.75rem; padding: 0.6rem 0.8rem; background: rgba(217,122,108,0.08); border: 1px solid rgba(217,122,108,0.3); border-radius: 6px; }

  details { font-size: 0.7rem; color: #6a6356; }
  details summary { cursor: pointer; padding: 0.4rem 0; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.6rem; }
  details pre { white-space: pre-wrap; word-break: break-word; background: #faf6ee; padding: 0.6rem; border-radius: 4px; max-height: 300px; overflow-y: auto; font-size: 0.65rem; line-height: 1.5; }
</style>
</head>
<body>
  <header>
    <h1>Moments — Group Diorama Test</h1>
    <span class="badge">v1 · gpt-image-1</span>
  </header>

  <div class="layout">
    <aside class="panel">
      <div>
        <label>Source photo</label>
        <input type="file" id="file" accept="image/*">
        <img id="preview" class="preview-thumb" style="display:none; margin-top:0.5rem;">
      </div>

      <div>
        <label>Notes (optional)</label>
        <textarea id="notes" placeholder="Family laser tag day, summer 2024 at the park..."></textarea>
      </div>

      <button id="generate" class="btn btn-primary" disabled>Generate Diorama</button>

      <div id="error" class="error" style="display:none;"></div>
    </aside>

    <main class="stage" id="stage">
      <div class="empty">Upload a group photo to begin.</div>
    </main>
  </div>

<script>
  const fileInput = document.getElementById('file')
  const notesInput = document.getElementById('notes')
  const generateBtn = document.getElementById('generate')
  const previewImg = document.getElementById('preview')
  const stage = document.getElementById('stage')
  const errorBox = document.getElementById('error')

  let sourceB64 = null

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0]
    if (!file) return

    const reader = new FileReader()
    reader.onload = (ev) => {
      const dataUrl = ev.target.result
      previewImg.src = dataUrl
      previewImg.style.display = 'block'
      sourceB64 = dataUrl.split(',')[1]
      generateBtn.disabled = false
      errorBox.style.display = 'none'
    }
    reader.readAsDataURL(file)
  })

  generateBtn.addEventListener('click', async () => {
    if (!sourceB64) return

    generateBtn.disabled = true
    errorBox.style.display = 'none'

    // Progress UI
    const startTime = Date.now()
    stage.innerHTML = `
      <div class="progress">
        <div class="progress-skeleton"></div>
        <div class="progress-stage" id="progress-stage">Preparing source</div>
        <div class="progress-timer" id="progress-timer">0s</div>
        <div class="progress-hint">gpt-image-1 · typical 50–80s</div>
      </div>
    `
    const stageEl = document.getElementById('progress-stage')
    const timerEl = document.getElementById('progress-timer')
    const timerInt = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000)
      timerEl.textContent = `${elapsed}s`
    }, 100)
    const stageTimers = [
      setTimeout(() => { if (stageEl) stageEl.textContent = 'Generating diorama' }, 1500),
      setTimeout(() => { if (stageEl) stageEl.textContent = 'Sculpting figures' }, 20000),
      setTimeout(() => { if (stageEl) stageEl.textContent = 'Finalizing scene' }, 50000),
    ]

    try {
      const res = await fetch('/api/v1/moments/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source_image_b64: sourceB64,
          notes: notesInput.value.trim(),
        }),
      })

      clearInterval(timerInt)
      stageTimers.forEach(t => clearTimeout(t))

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}))
        throw new Error(errData.error || `Server error: ${res.status}`)
      }

      const data = await res.json()
      const r = data.result || {}

      stage.innerHTML = ''
      const card = document.createElement('div')
      card.className = 'result-card'
      const img = document.createElement('img')
      img.src = `data:image/png;base64,${r.image_b64}`
      card.appendChild(img)

      const meta = document.createElement('div')
      meta.className = 'meta'
      meta.innerHTML = `
        <div><strong>Module:</strong> moments</div>
        <div><strong>Notes:</strong> ${r.notes || '(none)'}</div>
        <div><strong>Generated:</strong> ${new Date().toLocaleString()}</div>
      `
      card.appendChild(meta)

      const promptDetails = document.createElement('details')
      promptDetails.innerHTML = `
        <summary>View prompt used</summary>
        <pre>${(r.prompt_used || '').replace(/</g, '&lt;')}</pre>
      `
      card.appendChild(promptDetails)

      stage.appendChild(card)

    } catch (err) {
      clearInterval(timerInt)
      stageTimers.forEach(t => clearTimeout(t))
      stage.innerHTML = '<div class="empty">Generation failed.</div>'
      errorBox.textContent = err.message
      errorBox.style.display = 'block'
    } finally {
      generateBtn.disabled = false
    }
  })
</script>
</body>
</html>

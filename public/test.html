<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minirama · Debug Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:#F4F4F2;--surface:#FFF;--surface2:#F0EFE9;--border:#E0DDD5;--border2:#CCCAC0;
  --text:#1A1A18;--muted:#888880;--dim:#C8C6BE;
  --accent:#C47E00;--green:#1E8C4A;--red:#C0392B;--orange:#C0622B;--blue:#2176AE;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;display:flex;flex-direction:column}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:.6rem;flex-shrink:0}
.logo{font-family:var(--mono);font-size:.75rem;font-weight:700;color:var(--accent);letter-spacing:.05em}
.logo span{color:var(--muted);font-weight:400}
.tb-div{width:1px;height:16px;background:var(--border2);flex-shrink:0}
.upload-label{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border2);border-radius:5px;cursor:pointer;font-size:.68rem;color:var(--muted);font-family:var(--mono);transition:all .15s}
.upload-label:hover{border-color:var(--accent);color:var(--text)}
.upload-label.has-file{border-color:var(--green);color:var(--green)}
.upload-label input{display:none}
.run-all-btn{padding:6px 14px;background:var(--accent);color:#000;border:none;border-radius:5px;font-family:var(--mono);font-size:.68rem;font-weight:700;cursor:pointer;letter-spacing:.04em}
.run-all-btn:hover:not(:disabled){filter:brightness(1.1)}
.run-all-btn:disabled{opacity:.35;cursor:not-allowed}
.export-btn{padding:6px 14px;background:var(--surface);color:var(--blue);border:1px solid var(--blue);border-radius:5px;font-family:var(--mono);font-size:.68rem;font-weight:700;cursor:pointer}
.export-btn:hover{background:var(--blue);color:#fff}
.session-input{padding:5px 10px;border:1px solid var(--border2);border-radius:5px;font-family:var(--mono);font-size:.65rem;color:var(--text);background:var(--bg);width:180px;outline:none}
.status-wrap{margin-left:auto;display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:.65rem;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.status-dot.running{background:var(--accent);animation:pulse 1s infinite}
.status-dot.done{background:var(--green)}
.status-dot.error{background:var(--red)}
.layout{display:grid;grid-template-columns:300px 1fr 300px;flex:1;overflow:hidden;min-height:0}
.left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hdr{padding:.55rem .85rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-family:var(--mono);font-size:.58rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.add-btn{padding:3px 10px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.62rem;cursor:pointer;transition:all .15s}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.cases-list{flex:1;overflow-y:auto;padding:.5rem}
.case-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;overflow:hidden}
.case-hdr{display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer;user-select:none}
.case-hdr:hover{background:rgba(0,0,0,.02)}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .2s}
.cdot.running{background:var(--accent);animation:pulse 1s infinite}
.cdot.done{background:var(--green)}
.cdot.error{background:var(--red)}
.cname{font-family:var(--mono);font-size:.65rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctags{display:flex;gap:2px;flex-shrink:0}
.tag{font-size:.48rem;padding:1px 4px;border-radius:3px;background:var(--border);color:var(--muted);font-family:var(--mono);white-space:nowrap}
.tag.on{background:#d1fae5;color:var(--green)}
.tag.season{background:#e0f0ff;color:var(--blue)}
.tag.disaster{background:#ffe0e0;color:var(--red)}
.arrow{font-size:.6rem;color:var(--muted);transition:transform .15s;flex-shrink:0}
.case-card.open .arrow{transform:rotate(90deg)}
.cbody{display:none;padding:8px;border-top:1px solid var(--border)}
.case-card.open .cbody{display:block}
.field{margin-bottom:6px}
.field label{display:block;font-size:.57rem;font-weight:700;color:var(--muted);margin-bottom:2px;letter-spacing:.05em;text-transform:uppercase}
.field textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:.63rem;padding:3px 6px;outline:none;transition:border-color .15s;resize:vertical;min-height:46px;line-height:1.5}
.field textarea:focus{border-color:var(--accent)}
.sec-div{font-size:.55rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:6px 0 3px;border-bottom:1px solid var(--border);margin-bottom:6px}
/* Preset button grid */
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.preset-btn{padding:7px 4px;border:1.5px solid var(--border2);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.62rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.preset-btn.active.season{border-color:var(--blue);background:rgba(33,118,174,.1);color:var(--blue)}
.preset-btn.active.disaster{border-color:var(--red);background:rgba(192,57,43,.1);color:var(--red)}
.preset-divider{font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:6px 0 4px;text-align:center;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);margin:4px 0}
/* Pipeline */
.presets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.pre-btn{padding:5px 3px;border:1.5px solid var(--border2);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.58rem;font-weight:600;cursor:pointer;text-align:center;line-height:1.4;transition:all .15s}
.pre-btn:hover{border-color:var(--accent);color:var(--accent)}
.pre-btn.active{border-color:var(--accent);background:rgba(196,126,0,.1);color:var(--accent)}
.pre-sub{font-weight:400;font-size:.5rem;display:block;margin-top:1px}
.exp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.exp-btn{padding:4px 3px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.58rem;cursor:pointer;text-align:center;transition:all .15s}
.exp-btn:hover{border-color:var(--accent);color:var(--accent)}
.exp-btn.active{border-color:var(--accent);background:rgba(196,126,0,.08);color:var(--accent);font-weight:700}
.exp-sub{font-size:.5rem;font-weight:400;display:block}
.cactions{display:flex;gap:4px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.run-btn-case{flex:1;padding:5px;background:var(--accent);color:#000;border:none;border-radius:4px;font-family:var(--mono);font-size:.62rem;font-weight:700;cursor:pointer}
.run-btn-case:hover{filter:brightness(1.1)}
.del-btn{padding:5px 8px;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--muted);font-family:var(--mono);font-size:.62rem;cursor:pointer}
.del-btn:hover{border-color:var(--red);color:var(--red)}
.center{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.center-hdr{padding:.55rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;background:var(--surface);flex-shrink:0}
.results-grid{flex:1;overflow-y:auto;padding:.65rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:9px;align-content:start}
.rc{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.rc.stable{border-color:#6fcf97}
.rc.warn{border-color:var(--orange)}
.rc.error{border-color:var(--red)}
.rc-img{aspect-ratio:3/2;background:#E8E6E0;position:relative;overflow:hidden;cursor:zoom-in;display:flex;align-items:center;justify-content:center}
.rc-img img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.rc-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .18s}
.rc-img:hover .rc-overlay{background:rgba(0,0,0,.4)}
.rc-overlay-label{font-family:var(--mono);font-size:.68rem;color:#fff;background:rgba(0,0,0,.55);padding:4px 10px;border-radius:4px;opacity:0;transition:opacity .18s}
.rc-img:hover .rc-overlay-label{opacity:1}
.rc-spinner{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-family:var(--mono);font-size:.6rem}
.spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.fatal-banner{position:absolute;inset:0;background:rgba(192,57,43,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.fatal-icon{font-size:1.4rem;color:var(--red)}
.fatal-msg{font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--red);text-align:center;padding:0 .5rem}
.rc-body{padding:8px}
.rc-status{font-family:var(--mono);font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:4px}
.rc-status.stable{background:#d1fae5;color:var(--green)}
.rc-status.warn{background:#fff7ed;color:var(--orange)}
.rc-status.error{background:#fee2e2;color:var(--red)}
.rc-name{font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-bottom:4px}
.rc-btns{display:flex;gap:3px;margin-bottom:5px;flex-wrap:wrap}
.rc-btn{padding:3px 7px;border:1px solid var(--border2);border-radius:3px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.58rem;cursor:pointer;transition:all .15s}
.rc-btn:hover{border-color:var(--accent);color:var(--accent)}
.rc-btn.rerun{border-color:var(--blue);color:var(--blue)}
.rc-btn.rerun:hover{background:var(--blue);color:#fff}
.rc-log{font-family:var(--mono);font-size:.56rem;line-height:1.6}
.rl-ok{color:var(--green)}.rl-fail{color:var(--orange)}
.sl-divider{height:1px;background:var(--border);margin:3px 0}
.sl-i{font-size:.53rem;color:var(--dim);line-height:1.6}
.sl-200{color:#2a8a4a}.sl-500{color:var(--red)}.sl-0{color:var(--dim)}
.rc-collapse{margin-top:5px;border-top:1px solid var(--border);padding-top:5px}
.rc-collapse-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:var(--mono);font-size:.56rem;color:var(--muted);padding:2px 0;user-select:none}
.rc-collapse-hdr:hover{color:var(--accent)}
.rc-collapse-body{display:none;margin-top:4px}
.rc-collapse.open .rc-collapse-body{display:block}
.rc-prompt-text{font-family:var(--mono);font-size:.54rem;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:5px 7px;max-height:140px;overflow-y:auto}
.rc-params-text{font-family:var(--mono);font-size:.53rem;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:5px 7px;max-height:120px;overflow-y:auto}
.right{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.log-scroll{flex:1;overflow-y:auto;padding:.5rem .75rem}
.log-sec{margin-bottom:.65rem;border-left:2px solid var(--border2);padding-left:.6rem}
.log-sec.stable{border-left-color:var(--green)}
.log-sec.warn{border-left-color:var(--orange)}
.log-sec.error{border-left-color:var(--red)}
.log-sec-hdr{font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--accent);margin-bottom:3px}
.ll{font-family:var(--mono);font-size:.6rem;line-height:1.7;color:var(--muted);white-space:pre-wrap;word-break:break-all}
.ll.ok{color:var(--green)}.ll.err{color:var(--red)}.ll.warn{color:var(--orange)}
.ll.accent{color:var(--accent)}.ll.dim{color:var(--dim)}
.clear-btn{padding:2px 8px;border:1px solid var(--border2);border-radius:3px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.58rem;cursor:pointer}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;width:920px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.modal-hdr{padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;flex-shrink:0;background:var(--surface)}
.modal-title{font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--accent)}
.modal-act{padding:3px 10px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.62rem;cursor:pointer;transition:all .15s}
.modal-act:hover{border-color:var(--accent);color:var(--accent)}
.modal-close{margin-left:auto;padding:3px 10px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:.62rem;cursor:pointer}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-scroll{flex:1;overflow-y:auto;background:var(--bg)}
.mi-img-zone{background:#111;display:flex;align-items:center;justify-content:center;min-height:260px;max-height:56vh}
.mi-img-zone img{max-width:100%;max-height:56vh;object-fit:contain;display:block}
.mi-data{padding:1.1rem}
.mi-sec{margin-bottom:1.1rem}
.mi-sec-hdr{font-family:var(--mono);font-size:.58rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;padding-bottom:3px;border-bottom:2px solid var(--border)}
.mi-prompt{font-family:var(--mono);font-size:.62rem;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.8rem;max-height:300px;overflow-y:auto}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">minirama <span>/ debug lab</span></div>
  <div class="tb-div"></div>
  <label class="upload-label" id="uploadLabel">
    <span>📁</span><span id="uploadText">Upload source photo</span>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
  </label>
  <div class="tb-div"></div>
  <button class="run-all-btn" id="runAllBtn" disabled onclick="runCases(getAllIds())">▶ Run All Cases</button>
  <button class="export-btn" onclick="exportPPT()">📊 Export PPT</button>
  <input class="session-input" id="sessionName" placeholder="Session name…">
  <div class="status-wrap">
    <div class="status-dot" id="gDot"></div>
    <span id="gStatus">idle</span>
  </div>
</div>

<div class="layout">
  <div class="left">
    <div class="panel-hdr">
      <span class="panel-title">Cases</span>
      <button class="add-btn" onclick="addCase()">+ Add</button>
    </div>
    <div class="cases-list" id="casesList"></div>
  </div>

  <div class="center">
    <div class="center-hdr">
      <span class="panel-title">Results</span>
      <span id="centerMeta" style="font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-left:auto"></span>
    </div>
    <div class="results-grid" id="resultsGrid">
      <div id="emptyState" style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;color:var(--dim);font-family:var(--mono);font-size:.65rem;gap:.5rem">
        <div style="font-size:2rem">⬡</div><div>add cases and run</div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="panel-hdr">
      <span class="panel-title">Live Log</span>
      <button class="clear-btn" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-scroll" id="logPanel"><div class="ll dim">[ waiting ]</div></div>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-act" id="modalFullBtn" onclick="openFull(currentModal)">⛶ Full Size</button>
      <button class="modal-act" id="modalDlBtn" onclick="dl(currentModal)">↓ Save</button>
      <button class="modal-close" onclick="closeModal()">✕ Close</button>
    </div>
    <div class="modal-scroll" id="modalScroll">
      <div class="mi-img-zone" id="miImgZone"><img id="modalImg" alt=""></div>
      <div class="mi-data" id="miData"></div>
    </div>
  </div>
</div>

<script>
const API    = '/api/v1/generate'
const EXPAPI = '/api/v1/export'
const SEASONS   = ['summer','spring','fall','winter']
const DISASTERS = ['flood','fire','abandoned','explosion']
const ALL_PRESETS = [...SEASONS, ...DISASTERS]

let fileB64 = null, caseN = 0, running = false
let imgStore = {}, resStore = {}, currentModal = ''

document.getElementById('fileInput').addEventListener('change', function(){
  const f = this.files?.[0]; if(!f) return
  const r = new FileReader()
  r.onload = e => {
    fileB64 = e.target.result.split(',')[1]
    document.getElementById('uploadLabel').classList.add('has-file')
    document.getElementById('uploadText').textContent = '✓ ' + f.name
    document.getElementById('runAllBtn').disabled = false
    gLog('Photo loaded — ' + f.name, 'ok')
  }
  r.readAsDataURL(f)
})

function addCase(cfg={}) {
  caseN++
  const id = 'c' + caseN
  const defaultName = cfg.name || 'case-' + caseN
  const defaultPreset = cfg.preset || 'summer'

  const div = document.createElement('div')
  div.className = 'case-card open'
  div.dataset.id = id
  div.dataset.preset = 'full'
  div.dataset.expStr = 'medium'
  div.dataset.scenePrset = defaultPreset

  div.innerHTML = `
    <div class="case-hdr" onclick="toggleCase('${id}')">
      <div class="cdot" id="dot-${id}"></div>
      <div class="cname" id="nd-${id}">${esc(defaultName)}</div>
      <div class="ctags" id="tags-${id}"></div>
      <span class="arrow">›</span>
    </div>
    <div class="cbody">
      <div class="field" style="margin-bottom:8px">
        <label>Name</label>
        <input type="text" id="nm-${id}" value="${esc(defaultName)}" oninput="syncName('${id}')"
          style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:.63rem;padding:3px 6px;outline:none">
      </div>

      <div class="sec-div">Season</div>
      <div class="preset-grid">
        ${SEASONS.map(s => `<button class="preset-btn season ${s===defaultPreset?'active':''}" id="ps-${id}-${s}" onclick="selectPreset('${id}','${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}
      </div>

      <div class="preset-divider">— or disaster —</div>
      <div class="preset-grid">
        ${DISASTERS.map(s => `<button class="preset-btn disaster ${s===defaultPreset?'active':''}" id="ps-${id}-${s}" onclick="selectPreset('${id}','${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}
      </div>

      <div class="sec-div" style="margin-top:8px">Pipeline</div>
      <div class="presets">
        <button class="pre-btn" id="pre-go-${id}" onclick="setPipeline('${id}','gen_only')">Gen Only<span class="pre-sub">no post</span></button>
        <button class="pre-btn" id="pre-gh-${id}" onclick="setPipeline('${id}','gen_hl')">Gen + HL<span class="pre-sub">→ highlight</span></button>
        <button class="pre-btn active" id="pre-fu-${id}" onclick="setPipeline('${id}','full')">Full<span class="pre-sub">→ exp → hl</span></button>
      </div>
      <div id="expBlock-${id}">
        <div class="exp-row">
          <button class="exp-btn" id="exs-sm-${id}" onclick="setExpStr('${id}','small')">Small<span class="exp-sub">5%</span></button>
          <button class="exp-btn active" id="exs-md-${id}" onclick="setExpStr('${id}','medium')">Medium<span class="exp-sub">10%</span></button>
          <button class="exp-btn" id="exs-lg-${id}" onclick="setExpStr('${id}','large')">Large<span class="exp-sub">18%</span></button>
        </div>
      </div>

      <div class="sec-div">Override</div>
      <div class="field">
        <label>Custom Prompt (replaces all blocks)</label>
        <textarea id="cp-${id}" placeholder="Leave empty to use structured prompt…"></textarea>
      </div>

      <div class="cactions">
        <button class="run-btn-case" onclick="runCases(['${id}'])">▶ Run</button>
        <button class="del-btn" onclick="delCase('${id}')">✕</button>
      </div>
    </div>`

  document.getElementById('casesList').appendChild(div)
  syncTags(id)
}

function selectPreset(id, preset) {
  document.querySelector(`.case-card[data-id="${id}"]`).dataset.scenePrset = preset
  ALL_PRESETS.forEach(p => {
    const btn = document.getElementById(`ps-${id}-${p}`)
    if(btn) btn.classList.toggle('active', p === preset)
  })
  syncTags(id)
}

function setPipeline(id, preset) {
  const card = document.querySelector(`.case-card[data-id="${id}"]`)
  if(card) card.dataset.preset = preset
  ;['go','gh','fu'].forEach(k => {
    const m = {go:'gen_only',gh:'gen_hl',fu:'full'}
    document.getElementById('pre-'+k+'-'+id)?.classList.toggle('active', m[k]===preset)
  })
  document.getElementById('expBlock-'+id).style.display = preset==='full' ? '' : 'none'
  syncTags(id)
}

function setExpStr(id, size) {
  const card = document.querySelector(`.case-card[data-id="${id}"]`)
  if(card) card.dataset.expStr = size
  ;['sm','md','lg'].forEach(k => {
    const m = {sm:'small',md:'medium',lg:'large'}
    document.getElementById('exs-'+k+'-'+id)?.classList.toggle('active', m[k]===size)
  })
}

function syncTags(id) {
  const box = document.getElementById('tags-'+id); if(!box) return
  const card = document.querySelector(`.case-card[data-id="${id}"]`)
  const pipeline = card?.dataset.preset || 'full'
  const preset   = card?.dataset.scenePrset || 'summer'
  const isDisaster = DISASTERS.includes(preset)
  box.innerHTML = [
    pipeline!=='full' ? `<span class="tag warn">${pipeline==='gen_only'?'gen-only':'gen+hl'}</span>` : `<span class="tag on">full</span>`,
    `<span class="tag ${isDisaster?'disaster':'season'}">${preset}</span>`,
  ].join('')
}

function syncName(id) { document.getElementById('nd-'+id).textContent = document.getElementById('nm-'+id).value }
function toggleCase(id) { document.querySelector(`.case-card[data-id="${id}"]`).classList.toggle('open') }
function delCase(id) { document.querySelector(`.case-card[data-id="${id}"]`)?.remove() }

function collect(id) {
  const card    = document.querySelector(`.case-card[data-id="${id}"]`)
  const pipeline = card?.dataset.preset || 'full'
  const expStr  = card?.dataset.expStr || 'medium'
  const preset  = card?.dataset.scenePrset || 'summer'
  const padMap  = {small:0.05, medium:0.10, large:0.18}
  const cp      = document.getElementById('cp-'+id)?.value?.trim()
  return {
    name:         document.getElementById('nm-'+id)?.value || id,
    preset,
    expand:       pipeline === 'full',
    highlightAfter: pipeline === 'full' || pipeline === 'gen_hl',
    expandPadding: padMap[expStr] || 0.10,
    customPrompt: cp || undefined,
    _preset: pipeline, _expStr: expStr,
  }
}

function getAllIds() { return [...document.querySelectorAll('.case-card')].map(c => c.dataset.id) }

function deriveStatus(r) {
  if(!r || r.fatal_error) return {cls:'error', text:'❌ generation failed'}
  const fails = (r.render_log||[]).filter(l => !l.ok)
  if(!fails.length) return {cls:'stable', text:'✅ stable'}
  if(fails.length===1) return {cls:'warn', text:'⚠ '+fails[0].msg.slice(0,44)}
  return {cls:'warn', text:'⚠ '+fails.length+' issues'}
}

async function runCases(ids) {
  if(running){alert('Already running');return}
  if(!fileB64){alert('Upload a photo first');return}
  running = true; setG('running','running…'); clearLog()
  document.getElementById('emptyState')?.remove()
  ids.forEach(id => { const p=collect(id); mkLoading(p.name); setDot(id,'running') })
  const BATCH = 5
  gLog('━━ '+ids.length+' case(s) — up to '+BATCH+' parallel','accent')
  let ok=0, fail=0
  for(let i=0; i<ids.length; i+=BATCH) {
    const batch = ids.slice(i, i+BATCH)
    await Promise.allSettled(batch.map(async id => {
      const p = collect(id)
      gLog('▶ '+p.name,'accent')
      try {
        const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({source_image_b64: fileB64, variants:[p]})})
        if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'HTTP '+res.status)}
        const data = await res.json()
        const r = data.results?.[0]; if(!r) throw new Error('No result')
        logResult(r)
        if(r.fatal_error){mkFatal(r.name,r.fatal_error,r.system_log);setDot(id,'error');fail++}
        else{resStore[r.name]=r;imgStore[r.name]=r.image_b64;mkResult(r);setDot(id,'done');ok++}
        gLog('  ✓ '+p.name,'ok')
      } catch(e) {
        gLog('  ✗ '+p.name+': '+e.message,'err')
        mkFatal(p.name,e.message,[]);setDot(id,'error');fail++
      }
    }))
  }
  const sum = ids.length+' cases — '+ok+' ok, '+fail+' failed'
  gLog('\n'+sum, fail?'warn':'ok'); setG(fail?'error':'done',sum)
  document.getElementById('centerMeta').textContent = sum
  running = false
}

function mkLoading(name) {
  let c = document.getElementById('rc-'+name)
  if(!c){c=document.createElement('div');c.id='rc-'+name;c.className='rc';document.getElementById('resultsGrid').appendChild(c)}
  c.innerHTML=`<div class="rc-img"><div class="rc-spinner"><div class="spin"></div><div>${esc(name)}</div></div></div>
  <div class="rc-body"><div class="rc-name">${esc(name)}</div><div class="ll dim" style="font-size:.6rem">generating…</div></div>`
}

function mkFatal(name,err,slog) {
  let c=document.getElementById('rc-'+name); if(!c) return
  c.className='rc error'
  const nj=`"${esc(name)}"`
  c.innerHTML=`<div class="rc-img" onclick='openDetail(${nj})'><div class="fatal-banner"><div class="fatal-icon">✗</div><div class="fatal-msg">FATAL<br>${esc(err)}</div></div></div>
  <div class="rc-body"><div class="rc-status error">❌ fatal error</div><div class="rc-name">${esc(name)}</div>
  <div class="rc-btns"><button class="rc-btn" onclick='openDetail(${nj})'>🔍 Details</button></div>
  <div class="rc-log">${(slog||[]).map(l=>`<div class="sl-i sl-${l.code===200?'200':l.code===0?'0':'500'}">[${l.code||'--'}] ${esc(l.stage)}${l.err?': '+esc(String(l.err)):''}</div>`).join('')}</div></div>`
}

function mkResult(r) {
  let c=document.getElementById('rc-'+r.name); if(!c) return
  const st=deriveStatus(r); c.className='rc '+st.cls
  const nj=`"${esc(r.name)}"`
  const rl=(r.render_log||[]).map(l=>`<div class="rc-log"><span class="${l.ok?'rl-ok':'rl-fail'}">${l.ok?'✓':'●'}</span> <span>${esc(l.msg)}</span></div>`).join('')
  const sl=(r.system_log||[]).map(l=>`<div class="sl-i sl-${l.code===200?'200':l.code===0?'0':'500'}">[${l.code===0?'--':l.code}] ${esc(l.stage)}${l.err?': '+esc(String(l.err)):''}</div>`).join('')
  const promptCollapse = r.prompt_used ? `
    <div class="rc-collapse" id="pc-${esc(r.name)}">
      <div class="rc-collapse-hdr" onclick="toggleCollapse('pc-${esc(r.name)}')"><span>📋 Prompt Used</span><span>›</span></div>
      <div class="rc-collapse-body"><div class="rc-prompt-text">${esc(r.prompt_used)}</div></div>
    </div>` : ''
  const paramsStr = r.params_used ? JSON.stringify({preset:r.params_used.preset, pipeline:r.params_used._preset}, null, 2) : ''
  const paramsCollapse = paramsStr ? `
    <div class="rc-collapse" id="prc-${esc(r.name)}">
      <div class="rc-collapse-hdr" onclick="toggleCollapse('prc-${esc(r.name)}')"><span>⚙ Params</span><span>›</span></div>
      <div class="rc-collapse-body"><div class="rc-params-text">${esc(paramsStr)}</div></div>
    </div>` : ''
  c.innerHTML=`
    <div class="rc-img" onclick='openDetail(${nj})'>
      ${r.image_b64?`<img src="data:image/jpeg;base64,${r.image_b64}" style="pointer-events:none">`:`<div class="rc-spinner"><div>no image</div></div>`}
      <div class="rc-overlay"><span class="rc-overlay-label">🔍 inspect</span></div>
    </div>
    <div class="rc-body">
      <div class="rc-status ${st.cls}">${esc(st.text)}</div>
      <div class="rc-name">${esc(r.name)}</div>
      <div class="rc-btns">
        ${r.image_b64?`<button class="rc-btn" onclick="event.stopPropagation();dl(${nj})">↓ Save</button>`:''}
        <button class="rc-btn" onclick='openDetail(${nj})'>🔍 Inspect</button>
        <button class="rc-btn rerun" onclick="rerun(${nj})">↺ Re-run</button>
      </div>
      <div style="font-family:var(--mono);font-size:.56rem;line-height:1.6">${rl}${sl?`<div class="sl-divider"></div>${sl}`:''}</div>
      ${promptCollapse}${paramsCollapse}
    </div>`
}

function toggleCollapse(id) { document.getElementById(id)?.classList.toggle('open') }

async function rerun(name) {
  const r=resStore[name]; if(!r||!fileB64) return
  const p=r.params_used||r.params; if(!p) return
  running=true; setG('running','re-running '+name+'…'); mkLoading(name)
  try {
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({source_image_b64:fileB64,variants:[p]})})
    if(!res.ok) throw new Error('HTTP '+res.status)
    const data=await res.json()
    const nr=data.results?.[0]; if(!nr) throw new Error('No result')
    logResult(nr); resStore[nr.name]=nr; imgStore[nr.name]=nr.image_b64
    if(nr.fatal_error) mkFatal(nr.name,nr.fatal_error,nr.system_log)
    else mkResult(nr)
    gLog('↺ '+name+' done','ok')
  } catch(e){ gLog('Re-run error: '+e.message,'err'); mkFatal(name,e.message,[]) }
  running=false; setG('done','idle')
}

function openDetail(name) {
  const r=resStore[name], b=imgStore[name]
  currentModal=name
  document.getElementById('modalScroll').scrollTop=0
  document.getElementById('modalTitle').textContent=name
  const iz=document.getElementById('miImgZone'), img=document.getElementById('modalImg')
  if(b){img.src='data:image/jpeg;base64,'+b;iz.style.display='flex'}
  else iz.style.display='none'
  let html=''
  if(r?.prompt_used){
    html+=`<div class="mi-sec"><div class="mi-sec-hdr">Full Prompt</div><div class="mi-prompt">${esc(r.prompt_used)}</div></div>`
  }
  document.getElementById('miData').innerHTML = html||'<div style="font-family:var(--mono);font-size:.65rem;color:var(--muted);padding:.5rem 0">No data</div>'
  document.getElementById('modal').classList.add('open')
}

function closeModal() { document.getElementById('modal').classList.remove('open') }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal() })

async function exportPPT() {
  const results = Object.values(resStore)
  if(!results.length){alert('No results to export');return}
  const sessionName = document.getElementById('sessionName').value || 'Minirama-Session'
  gLog('📊 Building PPT…','accent')
  try {
    const res = await fetch(EXPAPI, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({results, session_name: sessionName})})
    if(!res.ok) {
      const errText = await res.text().catch(()=>'unknown error')
      throw new Error('HTTP '+res.status+' — '+errText.slice(0,100))
    }
    // Always treat as binary — export route returns raw PPTX
    const blob = await res.blob()
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = sessionName.replace(/\s+/g,'-')+'-'+Date.now()+'.pptx'
    a.click()
    setTimeout(()=>URL.revokeObjectURL(url), 1000)
    gLog('✓ PPT exported','ok')
  } catch(e){ gLog('✗ Export failed: '+e.message,'err') }
}

function logResult(r) {
  const panel=document.getElementById('logPanel')
  const sec=document.createElement('div')
  const st=deriveStatus(r); sec.className='log-sec '+st.cls
  let h=`<div class="log-sec-hdr">${esc(r.name)} — ${esc(st.text)}</div>`
  if(r.fatal_error) h+=`<div class="ll err">✗ FATAL: ${esc(r.fatal_error)}</div>`
  ;(r.render_log||[]).forEach(l=>{h+=`<div class="ll ${l.ok?'ok':'warn'}">  ${l.ok?'✓':'●'} ${esc(l.msg)}</div>`})
  ;(r.system_log||[]).forEach(l=>{h+=`<div class="ll ${l.code===200?'ok':l.code===0?'dim':'err'}">  [${l.code===0?'--':l.code}] ${esc(l.stage)}${l.err?': '+esc(String(l.err)):''}</div>`})
  sec.innerHTML=h; panel.appendChild(sec); panel.scrollTop=panel.scrollHeight
}
function gLog(msg,type=''){const p=document.getElementById('logPanel'),el=document.createElement('div');el.className='ll '+type;el.textContent=msg;p.appendChild(el);p.scrollTop=p.scrollHeight}
function clearLog(){document.getElementById('logPanel').innerHTML=''}
function setG(state,text){document.getElementById('gDot').className='status-dot '+state;document.getElementById('gStatus').textContent=text}
function setDot(id,state){const d=document.getElementById('dot-'+id);if(d)d.className='cdot '+state}
function dl(name){const b=imgStore[name];if(!b)return;const a=document.createElement('a');a.href='data:image/jpeg;base64,'+b;a.download='minirama-'+name.replace(/\s+/g,'-')+'-'+Date.now()+'.jpg';a.click()}
function openFull(name){const b=imgStore[name];if(!b)return;const w=window.open();w.document.write('<html><head><title>'+esc(name)+'</title><style>*{margin:0;padding:0;background:#111}img{max-width:100vw;max-height:100vh;object-fit:contain;display:block}</style></head><body><img src="data:image/jpeg;base64,'+b+'"></body></html>');w.document.close()}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

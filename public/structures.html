<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miniscape · Structures</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --walnut:#2C1A0E;--walnut-mid:#3D2614;--walnut-light:#5C3D22;
  --cream:#F5EFE4;--cream-dark:#EAE0D0;--cream-mid:#D4C4A8;
  --teal:#1D9E75;--teal-light:#5DCAA5;--teal-dark:#0F6E56;
  --gold:#C8860A;--gold-light:#EF9F27;
  --text:#1A0F06;--muted:#7A6050;--dim:#B8A898;
  --surface:#FDFAF5;--surface2:#F0E8D8;--border:#D4C4A8;--border2:#C4B090;
  --green:#1E8C4A;--red:#C0392B;--orange:#C0622B;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;--serif:'Playfair Display',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--cream);color:var(--text);font-family:var(--sans);font-size:13px;display:flex;flex-direction:column}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.topbar{height:52px;background:var(--walnut);border-bottom:2px solid var(--gold);display:flex;align-items:center;padding:0 1.25rem;gap:.75rem;flex-shrink:0}
.logo{font-family:var(--serif);font-size:1.1rem;color:var(--cream);flex-shrink:0}
.logo span{color:var(--teal-light)}
.logo-badge{font-size:.55rem;background:var(--gold);color:var(--walnut);padding:2px 7px;border-radius:10px;font-family:var(--sans);font-weight:700;margin-left:6px;vertical-align:middle}
.tb-div{width:1px;height:18px;background:rgba(255,255,255,.12);flex-shrink:0}

.upload-area{display:flex;align-items:center;gap:6px}
.upload-slots{display:flex;gap:5px;align-items:center}
.upload-slot{display:flex;align-items:center;gap:4px;padding:5px 10px;background:rgba(245,239,228,.08);border:1px solid rgba(245,239,228,.35);border-radius:6px;cursor:pointer;font-size:.72rem;color:var(--cream);transition:all .15s;white-space:nowrap}
.upload-slot:hover{border-color:var(--teal-light);color:var(--cream)}
.upload-slot.has-file{border-color:var(--teal);color:var(--teal-light);background:rgba(29,158,117,.15)}
.upload-slot input{display:none}
.slot-num{font-size:.62rem;background:rgba(245,239,228,.15);border-radius:3px;padding:1px 5px;font-family:var(--mono)}
.slot-num.filled{background:var(--teal-dark);color:var(--teal-light)}
.upload-hint{font-size:.62rem;color:rgba(245,239,228,.4);font-family:var(--mono)}
.upload-label{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(245,239,228,.08);border:1px solid rgba(245,239,228,.45);border-radius:6px;cursor:pointer;font-size:.75rem;color:var(--cream);font-family:var(--sans);transition:all .15s}
.upload-label:hover{border-color:var(--teal-light);color:var(--cream)}
.upload-label.has-file{border-color:var(--teal);color:var(--teal-light);background:rgba(29,158,117,.15)}
.upload-label input{display:none}
.run-all-btn{padding:7px 16px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-family:var(--sans);font-size:.78rem;font-weight:500;cursor:pointer;transition:background .2s;flex-shrink:0}
.run-all-btn:hover:not(:disabled){background:var(--teal-dark)}
.run-all-btn:disabled{opacity:.35;cursor:not-allowed}
.export-btn{padding:6px 12px;background:transparent;color:rgba(245,239,228,.85);border:1px solid rgba(245,239,228,.45);border-radius:6px;font-family:var(--sans);font-size:.72rem;cursor:pointer;transition:all .15s}
.export-btn:hover{border-color:rgba(245,239,228,.35);color:var(--cream)}
.session-input{padding:5px 10px;border:1px solid rgba(245,239,228,.35);border-radius:5px;font-family:var(--mono);font-size:.65rem;color:var(--cream);background:rgba(245,239,228,.1);width:160px;outline:none}
.session-input::placeholder{color:rgba(245,239,228,.45)}
.status-wrap{margin-left:auto;display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:.65rem;color:rgba(245,239,228,.75)}
.status-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.status-dot.running{background:var(--gold-light);animation:pulse 1s infinite}
.status-dot.done{background:var(--teal-light)}
.status-dot.error{background:#F09595}
.log-toggle{padding:4px 10px;background:transparent;border:1px solid rgba(245,239,228,.4);border-radius:4px;color:rgba(245,239,228,.8);font-family:var(--mono);font-size:.62rem;cursor:pointer;transition:all .15s}
.log-toggle:hover{border-color:rgba(245,239,228,.3);color:rgba(245,239,228,.7)}
.layout{display:grid;grid-template-columns:490px 1fr;flex:1;overflow:hidden;min-height:0}
.layout.log-open{grid-template-columns:490px 1fr 260px}
.left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hdr{padding:.6rem .9rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.add-btn{padding:3px 10px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--sans);font-size:.68rem;cursor:pointer;transition:all .15s}
.add-btn:hover{border-color:var(--teal);color:var(--teal)}
.cases-list{flex:1;overflow-y:auto;padding:.6rem}
.case-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.case-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;user-select:none}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .2s}
.cdot.running{background:var(--gold-light);animation:pulse 1s infinite}
.cdot.done{background:var(--teal)}
.cdot.error{background:#E24B4A}
.cname{font-size:.78rem;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.ctags{display:flex;gap:3px;flex-shrink:0}
.tag{font-size:.55rem;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
.tag.on{background:#d1fae5;color:#0F6E56}
.tag.season{background:#E1F5EE;color:#0F6E56}
.tag.disaster{background:#FCEBEB;color:#A32D2D}
.tag.special{background:#EEEDFE;color:#3C3489}
.tag.warn{background:#FFF7ED;color:#854F0B}
.arrow{font-size:.65rem;color:var(--dim);transition:transform .15s;flex-shrink:0}
.case-card.open .arrow{transform:rotate(90deg)}
.cbody{display:none;padding:14px;border-top:1px solid var(--border);background:var(--surface2)}
.case-card.open .cbody{display:block}
.sec-div{font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:10px 0 7px;border-bottom:1px solid var(--border);margin-bottom:8px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.preset-btn{padding:14px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;text-align:center;transition:all .15s}
.preset-btn:hover{border-color:var(--teal);background:rgba(29,158,117,.04);transform:translateY(-1px)}
.preset-btn.active.season{border-color:var(--teal);background:rgba(29,158,117,.1)}
.preset-btn.active.disaster{border-color:#E24B4A;background:rgba(226,75,74,.08)}
.preset-btn.active.special{border-color:#7F77DD;background:rgba(127,119,221,.08)}
.pb-icon{font-size:1.55rem;display:block;margin-bottom:4px}
.pb-label{font-size:.82rem;font-weight:500;color:var(--text);display:block}
.preset-btn.active.season .pb-label{color:var(--teal-dark)}
.preset-btn.active.disaster .pb-label{color:#A32D2D}
.preset-btn.active.special .pb-label{color:#3C3489}
.preset-divider{font-size:.58rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:6px 0 4px;text-align:center;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);margin:5px 0}
.presets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.pre-btn{padding:10px 6px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);font-family:var(--sans);font-size:.75rem;font-weight:500;cursor:pointer;text-align:center;line-height:1.4;transition:all .15s}
.pre-btn:hover{border-color:var(--teal);color:var(--teal)}
.pre-btn.active{border-color:var(--teal);background:rgba(29,158,117,.1);color:var(--teal-dark)}
.pre-sub{font-weight:400;font-size:.62rem;display:block;margin-top:2px;color:var(--dim)}
.pre-btn.active .pre-sub{color:var(--teal)}
.name-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:.78rem;padding:6px 8px;outline:none;transition:border-color .15s;margin-bottom:8px}
.name-input:focus{border-color:var(--teal)}
.field{margin-bottom:6px}
.field label{display:block;font-size:.6rem;font-weight:500;color:var(--muted);margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase}
.field textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:.63rem;padding:5px 7px;outline:none;transition:border-color .15s;resize:vertical;min-height:46px;line-height:1.5}
.field textarea:focus{border-color:var(--teal)}
.cactions{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.run-btn-case{flex:1;padding:7px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-family:var(--sans);font-size:.75rem;font-weight:500;cursor:pointer}
.run-btn-case:hover{background:var(--teal-dark)}
.del-btn{padding:6px 10px;background:transparent;border:1.5px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--sans);font-size:.72rem;cursor:pointer}
.del-btn:hover{border-color:#E24B4A;color:#E24B4A}
.center{display:flex;flex-direction:column;overflow:hidden;background:var(--cream)}
.center-hdr{padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;background:var(--surface);flex-shrink:0}
.results-grid{flex:1;overflow-y:auto;padding:.75rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;align-content:start}
.rc{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeIn .3s ease}
.rc.stable{border-color:var(--teal)}
.rc.warn{border-color:var(--orange)}
.rc.error{border-color:#E24B4A}
.rc-img{aspect-ratio:1;background:var(--surface2);position:relative;overflow:hidden;cursor:zoom-in;display:flex;align-items:center;justify-content:center}
.rc-img img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.rc-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .18s}
.rc-img:hover .rc-overlay{background:rgba(0,0,0,.35)}
.rc-overlay-label{font-size:.72rem;color:#fff;background:rgba(0,0,0,.5);padding:5px 12px;border-radius:20px;opacity:0;transition:opacity .18s}
.rc-img:hover .rc-overlay-label{opacity:1}
.rc-spinner{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:.72rem}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
.fatal-banner{position:absolute;inset:0;background:rgba(192,57,43,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.fatal-msg{font-size:.68rem;font-weight:500;color:#A32D2D;text-align:center;padding:0 .75rem}
.rc-body{padding:10px 12px}
.rc-status{font-size:.68rem;font-weight:500;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:5px}
.rc-status.stable{background:#d1fae5;color:var(--green)}
.rc-status.warn{background:#fff7ed;color:var(--orange)}
.rc-status.error{background:#fee2e2;color:var(--red)}
.rc-name{font-size:.8rem;font-weight:500;color:var(--text);margin-bottom:2px}
.rc-preset{font-size:.68rem;color:var(--muted);margin-bottom:6px}
.rc-btns{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.rc-btn{padding:4px 9px;border:1.5px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--sans);font-size:.65rem;cursor:pointer;transition:all .15s}
.rc-btn:hover{border-color:var(--teal);color:var(--teal)}
.rc-btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.rc-btn.primary:hover{background:var(--teal-dark)}
.rc-diag{font-family:var(--mono);font-size:.56rem;line-height:1.65;color:var(--muted)}
.rc-diag .ok{color:var(--green)}.rc-diag .warn{color:var(--orange)}
.sl-divider{height:1px;background:var(--border);margin:3px 0}
.sl-i{font-size:.53rem;color:var(--dim);line-height:1.6}
.rc-collapse{margin-top:6px;border-top:1px solid var(--border);padding-top:5px}
.rc-collapse-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:.62rem;color:var(--muted);padding:2px 0;user-select:none}
.rc-collapse-hdr:hover{color:var(--teal)}
.rc-collapse-body{display:none;margin-top:4px}
.rc-collapse.open .rc-collapse-body{display:block}
.rc-prompt-text{font-family:var(--mono);font-size:.54rem;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 8px;max-height:140px;overflow-y:auto}
.right{background:var(--surface);border-left:1px solid var(--border);display:none;flex-direction:column;overflow:hidden}
.right.open{display:flex}
.log-scroll{flex:1;overflow-y:auto;padding:.5rem .75rem}
.log-sec{margin-bottom:.65rem;border-left:2px solid var(--border);padding-left:.6rem}
.log-sec.stable{border-left-color:var(--teal)}
.log-sec.warn{border-left-color:var(--orange)}
.log-sec.error{border-left-color:#E24B4A}
.log-sec-hdr{font-family:var(--mono);font-size:.58rem;font-weight:700;color:var(--gold);margin-bottom:3px}
.ll{font-family:var(--mono);font-size:.58rem;line-height:1.7;color:var(--muted);white-space:pre-wrap;word-break:break-all}
.ll.ok{color:var(--green)}.ll.err{color:#E24B4A}.ll.warn{color:var(--orange)}.ll.accent{color:var(--gold)}.ll.dim{color:var(--dim)}
.clear-btn{padding:2px 8px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);font-size:.62rem;cursor:pointer}
.clear-btn:hover{border-color:#E24B4A;color:#E24B4A}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:960px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.modal-hdr{padding:.65rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.modal-title{font-family:var(--serif);font-size:.9rem;color:var(--walnut)}
.modal-act{padding:4px 12px;border:1.5px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:.68rem;cursor:pointer;transition:all .15s}
.modal-act:hover{border-color:var(--teal);color:var(--teal)}
.modal-act.save{background:var(--teal);border-color:var(--teal);color:#fff}
.modal-act.save:hover{background:var(--teal-dark)}
.modal-close{margin-left:auto;padding:4px 12px;border:1.5px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:.68rem;cursor:pointer}
.modal-close:hover{border-color:#E24B4A;color:#E24B4A}
.modal-scroll{flex:1;overflow-y:auto;background:var(--cream)}
.mi-img-zone{background:#1A0F06;display:flex;align-items:center;justify-content:center;min-height:300px;max-height:60vh}
.mi-img-zone img{max-width:100%;max-height:60vh;object-fit:contain;display:block}
.mi-data{padding:1.25rem}
.mi-sec{margin-bottom:1.1rem}
.mi-sec-hdr{font-size:.62rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;padding-bottom:4px;border-bottom:1px solid var(--border)}
.mi-prompt{font-family:var(--mono);font-size:.62rem;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.85rem;max-height:280px;overflow-y:auto}
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;color:var(--dim);gap:.75rem;text-align:center}
.empty-icon{font-size:2.5rem;opacity:.4}
.empty-title{font-family:var(--serif);font-size:1.1rem;color:var(--muted)}
.empty-sub{font-size:.78rem;color:var(--dim);max-width:280px;line-height:1.6}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.toggle-label{font-size:.72rem;color:var(--text);font-weight:500}
.toggle-sub{font-size:.62rem;color:var(--muted);display:block}
.toggle-wrap{display:flex;align-items:center;gap:6px}
.toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:18px;cursor:pointer;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked + .toggle-slider{background:var(--teal)}
.toggle input:checked + .toggle-slider::before{transform:translateX(16px)}
.toggle-val{font-size:.65rem;color:var(--muted);font-family:var(--mono);width:22px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" style="color:var(--cream-mid);font-size:.7rem;font-family:var(--mono);text-decoration:none;padding:4px 10px;border:1px solid rgba(245,239,228,.2);border-radius:4px;margin-right:.5rem;transition:all .2s" onmouseover="this.style.borderColor='var(--teal)'" onmouseout="this.style.borderColor='rgba(245,239,228,.2)'">← Home</a><div class="logo">mini<span>scape</span> <span class="logo-badge">STRUCTURES</span></div>
  <div class="tb-div"></div>
  <div class="upload-area">
    <div class="upload-slots">
      <label class="upload-slot" id="slot1" title="Main photo (required) — front view">
        <span class="slot-num" id="sn1">1</span>
        <span>📷</span><span id="st1">Front view</span>
        <input type="file" id="file1" accept="image/jpeg,image/png,image/webp" onchange="slotChange(1,this)">
      </label>
      <label class="upload-slot" id="slot2" title="Side view (optional)">
        <span class="slot-num" id="sn2">2</span>
        <span>📷</span><span id="st2">Side view</span>
        <input type="file" id="file2" accept="image/jpeg,image/png,image/webp" onchange="slotChange(2,this)">
      </label>
      <label class="upload-slot" id="slot3" title="Rear/other angle (optional)">
        <span class="slot-num" id="sn3">3</span>
        <span>📷</span><span id="st3">Other angle</span>
        <input type="file" id="file3" accept="image/jpeg,image/png,image/webp" onchange="slotChange(3,this)">
      </label>
    </div>
    <span class="upload-hint">street view angles</span>
  </div>
  <div class="tb-div"></div>
  <button class="run-all-btn" id="runAllBtn" disabled onclick="runCases(getAllIds())">▶ Generate All</button>
  <button class="export-btn" onclick="exportPPT()">Export PPT</button>
  <input class="session-input" id="sessionName" placeholder="Session name…">
  <div class="status-wrap">
    <div class="status-dot" id="gDot"></div>
    <span id="gStatus">ready</span>
  </div>
  <button class="log-toggle" id="logToggleBtn" onclick="toggleLog()">Dev Log</button>
</div>
<div class="layout" id="layout">
  <div class="left">
    <div class="panel-hdr">
      <span class="panel-title">Dioramas</span>
      <button class="add-btn" onclick="addCase()">+ New</button>
    </div>
    <div class="cases-list" id="casesList"></div>
  </div>
  <div class="center">
    <div class="center-hdr">
      <span class="panel-title">Results</span>
      <span id="centerMeta" style="font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-left:auto"></span>
    </div>
    <div class="results-grid" id="resultsGrid">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">Your dioramas appear here</div>
        <div class="empty-sub">Upload a photo, choose a scene, and hit Generate</div>
      </div>
    </div>
  </div>
  <div class="right" id="logPanel-wrap">
    <div class="panel-hdr">
      <span class="panel-title">Dev Log</span>
      <button class="clear-btn" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-scroll" id="logPanel"><div class="ll dim">[ waiting ]</div></div>
  </div>
</div>
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-act save" onclick="dl(currentModal)">↓ Save HD</button>
      <button class="modal-act" onclick="openFull(currentModal)">⛶ Full screen</button>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-scroll" id="modalScroll">
      <div class="mi-img-zone" id="miImgZone"><img id="modalImg" alt=""></div>
      <div class="mi-data" id="miData"></div>
    </div>
  </div>
</div>
<script>
const API='/api/v1/structures/generate',EXPAPI='/api/v1/export'
const SEASONS=['summer','spring','fall','winter']
const DISASTERS=['flood','fire','abandoned','explosion']
const SPECIAL=['haunted','alien']
const ALL_PRESETS=[...SEASONS,...DISASTERS,...SPECIAL]
const PM={summer:{i:'☀️',l:'Summer'},spring:{i:'🌸',l:'Spring'},fall:{i:'🍂',l:'Fall'},winter:{i:'❄️',l:'Winter'},flood:{i:'🌊',l:'Flood'},fire:{i:'🔥',l:'Fire'},abandoned:{i:'🏚️',l:'Abandoned'},explosion:{i:'💥',l:'Explosion'},haunted:{i:'🦇',l:'Haunted'},alien:{i:'🪐',l:'Alien'}}
let fileB64=null,extraImages=[],caseN=0,running=false,imgStore={},resStore={},currentModal='',logOpen=false

function slotChange(n, input) {
  const f = input.files?.[0]; if(!f) return
  const r = new FileReader()
  r.onload = e => {
    const b64 = e.target.result.split(',')[1]
    const short = f.name.length > 12 ? f.name.slice(0,10)+'…' : f.name
    if(n === 1) {
      fileB64 = b64
      document.getElementById('runAllBtn').disabled = false
      gLog('Photo 1 loaded: '+f.name,'ok')
    } else {
      extraImages[n-2] = b64
      gLog('Photo '+n+' loaded: '+f.name,'ok')
    }
    document.getElementById('slot'+n).classList.add('has-file')
    document.getElementById('sn'+n).classList.add('filled')
    document.getElementById('st'+n).textContent = '✓ '+short
    updateUploadHint()
  }
  r.readAsDataURL(f)
}

function updateUploadHint() {
  const count = [fileB64,...extraImages.filter(Boolean)].length
  const hint = document.querySelector('.upload-hint')
  if(hint) hint.textContent = count === 1 ? '+ add more angles' : count+' photos · multi-angle analysis'
}
function toggleLog(){
  logOpen=!logOpen
  document.getElementById('logPanel-wrap').classList.toggle('open',logOpen)
  document.getElementById('layout').classList.toggle('log-open',logOpen)
  const b=document.getElementById('logToggleBtn')
  b.style.color=logOpen?'var(--teal-light)':''
  b.style.borderColor=logOpen?'var(--teal)':''
}
function addCase(cfg={}){
  caseN++;const id='c'+caseN
  const dn=cfg.name||'Diorama '+caseN,dp=cfg.preset||'summer'
  const div=document.createElement('div')
  div.className='case-card open';div.dataset.id=id;div.dataset.preset='full';div.dataset.scenePrset=dp
  const sb=SEASONS.map(s=>`<button class="preset-btn season ${s===dp?'active':''}" id="ps-${id}-${s}" onclick="selectPreset('${id}','${s}')"><span class="pb-icon">${PM[s].i}</span><span class="pb-label">${PM[s].l}</span></button>`).join('')
  const db=DISASTERS.map(s=>`<button class="preset-btn disaster ${s===dp?'active':''}" id="ps-${id}-${s}" onclick="selectPreset('${id}','${s}')"><span class="pb-icon">${PM[s].i}</span><span class="pb-label">${PM[s].l}</span></button>`).join('')
  const spb=SPECIAL.map(s=>`<button class="preset-btn special ${s===dp?'active':''}" id="ps-${id}-${s}" onclick="selectPreset('${id}','${s}')"><span class="pb-icon">${PM[s].i}</span><span class="pb-label">${PM[s].l}</span></button>`).join('')
  div.innerHTML=`<div class="case-hdr" onclick="toggleCase('${id}')"><div class="cdot" id="dot-${id}"></div><div class="cname" id="nd-${id}">${esc(dn)}</div><div class="ctags" id="tags-${id}"></div><span class="arrow">›</span></div>
  <div class="cbody">
    <input type="text" class="name-input" id="nm-${id}" value="${esc(dn)}" oninput="syncName('${id}')" placeholder="Name this diorama…">
    <div class="sec-div">Season</div><div class="preset-grid">${sb}</div>
    <div class="preset-divider">— disaster —</div><div class="preset-grid">${db}</div>
    <div class="preset-divider">— special —</div><div class="preset-grid">${spb}</div>
    <div class="sec-div" style="margin-top:10px">Pipeline</div>
    <div class="presets">
      <button class="pre-btn" id="pre-go-${id}" onclick="setPipeline('${id}','gen_only')">Generate only<span class="pre-sub">no post-process</span></button>
      <button class="pre-btn" id="pre-gh-${id}" onclick="setPipeline('${id}','gen_hl')">Gen + levels<span class="pre-sub">brightness adjust</span></button>
      <button class="pre-btn active" id="pre-fu-${id}" onclick="setPipeline('${id}','full')">Full pipeline<span class="pre-sub">all steps</span></button>
    </div>
    <div class="field"><label>Manual override (optional)</label><textarea id="cp-${id}" placeholder="Extra instructions or full prompt override…"></textarea></div>
    <div class="toggle-row">
      <div><span class="toggle-label">Interior lights</span><span class="toggle-sub">Warm window glow (slightly softer texture)</span></div>
      <div class="toggle-wrap">
        <label class="toggle"><input type="checkbox" id="il-${id}" checked onchange="syncTags('${id}')"><span class="toggle-slider"></span></label>
        <span class="toggle-val" id="ilv-${id}">on</span>
      </div>
    </div>
    <div class="cactions"><button class="run-btn-case" onclick="runCases(['${id}'])">▶ Generate</button><button class="del-btn" onclick="delCase('${id}')">✕</button></div>
  </div>`
  document.getElementById('casesList').appendChild(div);syncTags(id)
}
function selectPreset(id,preset){
  document.querySelector(`.case-card[data-id="${id}"]`).dataset.scenePrset=preset
  ALL_PRESETS.forEach(p=>{const b=document.getElementById(`ps-${id}-${p}`);if(b)b.classList.toggle('active',p===preset)})
  syncTags(id)
}
function setPipeline(id,preset){
  const card=document.querySelector(`.case-card[data-id="${id}"]`);if(card)card.dataset.preset=preset
  ;['go','gh','fu'].forEach(k=>{const m={go:'gen_only',gh:'gen_hl',fu:'full'};document.getElementById('pre-'+k+'-'+id)?.classList.toggle('active',m[k]===preset)})
  syncTags(id)
}
function syncTags(id){
  const box=document.getElementById('tags-'+id);if(!box)return
  const card=document.querySelector(`.case-card[data-id="${id}"]`)
  const pipeline=card?.dataset.preset||'full',preset=card?.dataset.scenePrset||'summer'
  const tt=DISASTERS.includes(preset)?'disaster':SPECIAL.includes(preset)?'special':'season'
  const m=PM[preset]
  const ilEl=document.getElementById('il-'+id);const ilOn=ilEl?ilEl.checked:true;const valEl=document.getElementById('ilv-'+id);if(valEl)valEl.textContent=ilOn?'on':'off'
box.innerHTML=[(pipeline!=='full'?`<span class="tag warn">${pipeline==='gen_only'?'gen only':'gen+hl'}</span>`:`<span class="tag on">full</span>`),`<span class="tag ${tt}">${m?.i||''} ${m?.l||preset}</span>`,(!ilOn?`<span class="tag warn">no lights</span>`:'')].join('')
}
function syncName(id){document.getElementById('nd-'+id).textContent=document.getElementById('nm-'+id).value}
function toggleCase(id){document.querySelector(`.case-card[data-id="${id}"]`).classList.toggle('open')}
function delCase(id){document.querySelector(`.case-card[data-id="${id}"]`)?.remove()}
function collect(id){
  const card=document.querySelector(`.case-card[data-id="${id}"]`)
  const pipeline=card?.dataset.preset||'full',preset=card?.dataset.scenePrset||'summer'
  const cp=document.getElementById('cp-'+id)?.value?.trim()
  const il=document.getElementById('il-'+id);const interiorLights=il?il.checked:true
  return{name:document.getElementById('nm-'+id)?.value||id,preset,expand:pipeline==='full',highlightAfter:pipeline==='full'||pipeline==='gen_hl',interiorLights,customPrompt:cp||undefined,_preset:pipeline}
}
function getAllIds(){return[...document.querySelectorAll('.case-card')].map(c=>c.dataset.id)}
function deriveStatus(r){
  if(!r||r.fatal_error)return{cls:'error',text:'Generation failed'}
  const fails=(r.render_log||[]).filter(l=>!l.ok)
  if(!fails.length)return{cls:'stable',text:'Stable'}
  if(fails.length===1)return{cls:'warn',text:fails[0].msg.slice(0,40)}
  return{cls:'warn',text:fails.length+' issues'}
}
async function runCases(ids){
  if(running){alert('Already running');return}
  if(!fileB64){alert('Upload at least the front view photo first');return}
  running=true;setG('running','generating…');clearLog()
  document.getElementById('emptyState')?.remove()
  ids.forEach(id=>{const p=collect(id);mkLoading(p.name);setDot(id,'running')})
  gLog('Running '+ids.length+' diorama(s)…','accent')
  let ok=0,fail=0
  for(let i=0;i<ids.length;i+=3){
    const batch=ids.slice(i,i+3)
    await Promise.allSettled(batch.map(async id=>{
      const p=collect(id);gLog('▶ '+p.name+' ('+p.preset+')','accent')
      try{
        const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source_image_b64:fileB64,extra_images:extraImages.filter(Boolean),variants:[p]})})
        if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'HTTP '+res.status)}
        const data=await res.json();const r=data.results?.[0];if(!r)throw new Error('No result')
        logResult(r)
        if(r.fatal_error){mkFatal(r.name,r.fatal_error,r.system_log);setDot(id,'error');fail++}
        else{resStore[r.name]=r;imgStore[r.name]=r.image_b64;mkResult(r);setDot(id,'done');ok++}
        gLog('  ✓ '+p.name,'ok')
      }catch(e){gLog('  ✗ '+p.name+': '+e.message,'err');mkFatal(p.name,e.message,[]);setDot(id,'error');fail++}
    }))
  }
  const sum=ok+' created'+(fail?' · '+fail+' failed':'')
  gLog(sum,fail?'warn':'ok');setG(fail?'error':'done',sum)
  document.getElementById('centerMeta').textContent=sum;running=false
}
function mkLoading(name){
  let c=document.getElementById('rc-'+name)
  if(!c){c=document.createElement('div');c.className='rc';c.id='rc-'+name;document.getElementById('resultsGrid').appendChild(c)}
  c.innerHTML=`<div class="rc-img"><div class="rc-spinner"><div class="spin"></div><div>Creating your diorama…</div></div></div><div class="rc-body"><div class="rc-name">${esc(name)}</div></div>`
}
function mkFatal(name,err,slog){
  let c=document.getElementById('rc-'+name);if(!c)return;c.className='rc error'
  const nj=`"${esc(name)}"`
  c.innerHTML=`<div class="rc-img"><div class="fatal-banner"><div style="font-size:1.5rem">✗</div><div class="fatal-msg">Failed: ${esc(err)}</div></div></div><div class="rc-body"><div class="rc-status error">Failed</div><div class="rc-name">${esc(name)}</div><div class="rc-btns"><button class="rc-btn" onclick='openDetail(${nj})'>Details</button></div></div>`
}
function mkResult(r){
  let c=document.getElementById('rc-'+r.name);if(!c)return
  const st=deriveStatus(r);c.className='rc '+st.cls
  const nj=`"${esc(r.name)}"`
  const m=PM[r.params_used?.preset]||{}
  const rl=(r.render_log||[]).map(l=>`<div><span class="${l.ok?'ok':'warn'}">${l.ok?'✓':'●'}</span> ${esc(l.msg)}</div>`).join('')
  const sl=(r.system_log||[]).map(l=>`<div class="sl-i">[${l.code===0?'--':l.code}] ${esc(l.stage)}${l.err?' · '+esc(String(l.err)):''}</div>`).join('')
  const pc=r.prompt_used?`<div class="rc-collapse" id="pc-${esc(r.name)}"><div class="rc-collapse-hdr" onclick="toggleCollapse('pc-${esc(r.name)}')"><span>View prompt</span><span>›</span></div><div class="rc-collapse-body"><div class="rc-prompt-text">${esc(r.prompt_used)}</div></div></div>`:''
  c.innerHTML=`<div class="rc-img" onclick='openDetail(${nj})'>${r.image_b64?`<img src="data:image/jpeg;base64,${r.image_b64}" style="pointer-events:none">`:`<div class="rc-spinner"><div>no image</div></div>`}<div class="rc-overlay"><span class="rc-overlay-label">View full size</span></div></div><div class="rc-body"><div class="rc-status ${st.cls}">${esc(st.text)}</div><div class="rc-name">${esc(r.name)}</div><div class="rc-preset">${m.i||''} ${m.l||r.params_used?.preset||''}</div><div class="rc-btns">${r.image_b64?`<button class="rc-btn primary" onclick="event.stopPropagation();dl(${nj})">↓ Save</button>`:''}<button class="rc-btn" onclick='openDetail(${nj})'>View</button><button class="rc-btn" onclick="rerun(${nj})">↺ Re-run</button></div><div class="rc-diag">${rl}${sl?`<div class="sl-divider"></div>${sl}`:''}</div>${pc}</div>`
}
function toggleCollapse(id){document.getElementById(id)?.classList.toggle('open')}
async function rerun(name){
  const r=resStore[name];if(!r||!fileB64)return
  const p=r.params_used||r.params;if(!p)return
  running=true;setG('running','re-running…');mkLoading(name)
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source_image_b64:fileB64,extra_images:extraImages.filter(Boolean),variants:[p]})})
    if(!res.ok)throw new Error('HTTP '+res.status)
    const data=await res.json();const nr=data.results?.[0];if(!nr)throw new Error('No result')
    logResult(nr);resStore[nr.name]=nr;imgStore[nr.name]=nr.image_b64
    if(nr.fatal_error)mkFatal(nr.name,nr.fatal_error,nr.system_log);else mkResult(nr)
    gLog('↺ '+name+' done','ok')
  }catch(e){gLog('Re-run failed: '+e.message,'err');mkFatal(name,e.message,[])}
  running=false;setG('done','done')
}
function openDetail(name){
  const r=resStore[name],b=imgStore[name];currentModal=name
  document.getElementById('modalScroll').scrollTop=0
  document.getElementById('modalTitle').textContent=name
  const iz=document.getElementById('miImgZone'),img=document.getElementById('modalImg')
  if(b){img.src='data:image/jpeg;base64,'+b;iz.style.display='flex'}else iz.style.display='none'
  let html=''
  if(r?.render_log?.length){html+=`<div class="mi-sec"><div class="mi-sec-hdr">Diagnostics</div>`;r.render_log.forEach(l=>{html+=`<div style="font-size:.78rem;padding:3px 0;color:${l.ok?'var(--green)':'var(--orange)'}">${l.ok?'✓':'●'} ${esc(l.msg)}</div>`});html+=`</div>`}
  if(r?.prompt_used){html+=`<div class="mi-sec"><div class="mi-sec-hdr">Prompt Used</div><div class="mi-prompt">${esc(r.prompt_used)}</div></div>`}
  document.getElementById('miData').innerHTML=html||'<div style="font-size:.78rem;color:var(--muted)">No data</div>'
  document.getElementById('modal').classList.add('open')
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()})
async function exportPPT(){
  const results=Object.values(resStore);if(!results.length){alert('No results yet');return}
  const sn=document.getElementById('sessionName').value||'Minirama-Session';gLog('Building PPT…','accent')
  try{
    const res=await fetch(EXPAPI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({results,session_name:sn})})
    if(!res.ok){const t=await res.text().catch(()=>'');throw new Error('HTTP '+res.status+' '+t.slice(0,80))}
    const blob=await res.blob(),url=URL.createObjectURL(blob),a=document.createElement('a')
    a.href=url;a.download=sn.replace(/\s+/g,'-')+'-'+Date.now()+'.pptx';a.click()
    setTimeout(()=>URL.revokeObjectURL(url),1000);gLog('PPT exported','ok')
  }catch(e){gLog('Export failed: '+e.message,'err')}
}
function logResult(r){
  const panel=document.getElementById('logPanel'),sec=document.createElement('div')
  const st=deriveStatus(r);sec.className='log-sec '+st.cls
  let h=`<div class="log-sec-hdr">${esc(r.name)}</div>`
  if(r.fatal_error)h+=`<div class="ll err">✗ ${esc(r.fatal_error)}</div>`
  ;(r.render_log||[]).forEach(l=>{h+=`<div class="ll ${l.ok?'ok':'warn'}">  ${l.ok?'✓':'●'} ${esc(l.msg)}</div>`})
  ;(r.system_log||[]).forEach(l=>{h+=`<div class="ll ${l.code===200?'ok':l.code===0?'dim':'err'}">  [${l.code===0?'--':l.code}] ${esc(l.stage)}${l.err?' '+esc(String(l.err)):''}</div>`})
  sec.innerHTML=h;panel.appendChild(sec);panel.scrollTop=panel.scrollHeight
}
function gLog(msg,type=''){const p=document.getElementById('logPanel'),el=document.createElement('div');el.className='ll '+type;el.textContent=msg;p.appendChild(el);p.scrollTop=p.scrollHeight}
function clearLog(){document.getElementById('logPanel').innerHTML=''}
function setG(state,text){document.getElementById('gDot').className='status-dot '+state;document.getElementById('gStatus').textContent=text}
function setDot(id,state){const d=document.getElementById('dot-'+id);if(d)d.className='cdot '+state}
function dl(name){const b=imgStore[name];if(!b)return;const a=document.createElement('a');a.href='data:image/jpeg;base64,'+b;a.download='minirama-'+name.replace(/\s+/g,'-')+'-'+Date.now()+'.jpg';a.click()}
function openFull(name){const b=imgStore[name];if(!b)return;const w=window.open();w.document.write('<html><head><title>'+name+'</title><style>*{margin:0;padding:0;background:#1A0F06}img{max-width:100vw;max-height:100vh;object-fit:contain;display:block;margin:auto}</style></head><body><img src="data:image/jpeg;base64,'+b+'"></body></html>');w.document.close()}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
addCase({name:'Summer',preset:'summer'})
addCase({name:'Fall',preset:'fall'})
addCase({name:'Winter',preset:'winter'})
addCase({name:'Spring',preset:'spring'})
addCase({name:'Fire',preset:'fire'})
addCase({name:'Abandoned',preset:'abandoned'})
addCase({name:'Haunted',preset:'haunted'})
addCase({name:'Alien',preset:'alien'})
</script>
</body>
</html>
